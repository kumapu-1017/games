  case 'seedpod':{c.fillStyle='#3ad8a0';c.globalAlpha=0.6;c.shadowColor='#3ad8a0';c.shadowBlur=10;c.beginPath();c.ellipse(x,y,s*0.18,s*0.32,0,0,7);c.fill();c.fillStyle='#fff';c.globalAlpha=0.8;c.beginPath();c.arc(x,y,s*0.07,0,7);c.fill();c.shadowBlur=0;break;}
  case 'aurora':{c.globalAlpha=0.3;const ag=c.createLinearGradient(x-s*0.5,y,x+s*0.5,y);ag.addColorStop(0,'rgba(58,168,224,0)');ag.addColorStop(0.5,'rgba(90,224,168,0.7)');ag.addColorStop(1,'rgba(168,90,224,0)');c.fillStyle=ag;c.fillRect(x-s*0.5,y-s*0.4,s,s*0.8);break;}
  case 'shrinegate':{c.fillStyle='#c0a8f0';c.globalAlpha=0.7;c.fillRect(x-s*0.4,y-s*0.4,s*0.08,s*0.8);c.fillRect(x+s*0.32,y-s*0.4,s*0.08,s*0.8);c.fillRect(x-s*0.45,y-s*0.45,s*0.9,s*0.1);break;}
  case 'sacredflame':{c.fillStyle='#e0c0ff';c.shadowColor='#c0a8f0';c.shadowBlur=14;c.globalAlpha=0.7;c.beginPath();c.moveTo(x,y-s*0.4);c.quadraticCurveTo(x+s*0.2,y,x,y+s*0.3);c.quadraticCurveTo(x-s*0.2,y,x,y-s*0.4);c.fill();c.shadowBlur=0;break;}
  case 'halo':{c.strokeStyle='#fff0a0';c.lineWidth=4;c.shadowColor='#fff0a0';c.shadowBlur=16;c.globalAlpha=0.6;c.beginPath();c.arc(x,y,s*0.4,0,7);c.stroke();c.shadowBlur=0;break;}
  case 'singularity':{c.fillStyle='#000';c.beginPath();c.arc(x,y,s*0.3,0,7);c.fill();c.strokeStyle='#ff5ad0';c.lineWidth=2;c.shadowColor='#ff5ad0';c.shadowBlur=18;c.globalAlpha=0.7;for(let k=1;k<=3;k++){c.beginPath();c.arc(x,y,s*0.3+k*s*0.12,0,7);c.globalAlpha=0.7/k;c.stroke();}c.shadowBlur=0;break;}
  case 'timefrag':{c.strokeStyle='#c0a8f0';c.lineWidth=1.5;c.globalAlpha=0.6;c.save();c.translate(x,y);c.rotate(performance.now()*0.001);for(let k=0;k<6;k++){c.rotate(Math.PI/3);c.beginPath();c.moveTo(0,0);c.lineTo(0,s*0.4);c.stroke();}c.restore();break;}
  case 'allstar':{c.fillStyle='#fff';c.shadowColor='#ff5ad0';c.shadowBlur=10;for(let k=0;k<5;k++){const a=k/5*Math.PI*2+performance.now()*0.0005;c.globalAlpha=0.5+0.5*Math.sin(performance.now()*0.003+k);c.beginPath();c.arc(x+Math.cos(a)*s*0.3,y+Math.sin(a)*s*0.3,s*0.05,0,7);c.fill();}c.shadowBlur=0;break;}
  }
  c.restore();};
</script>
<script>
Game.prototype.drawEnemy=function(e){const c=ctx;const x=e.x,y=e.y,r=e.r,col=e.col;const wob=Math.sin(e.wig||0)*1.5;
  c.save();c.translate(x,y);c.shadowColor=col;c.shadowBlur=8;
  const eye=(ex,ey,er)=>{c.shadowBlur=0;c.fillStyle='#fff';c.beginPath();c.arc(-ex,ey,er,0,7);c.arc(ex,ey,er,0,7);c.fill();c.fillStyle='#10203a';c.beginPath();c.arc(-ex,ey,er*0.5,0,7);c.arc(ex,ey,er*0.5,0,7);c.fill();};
  switch(e.shape){
  case 'fighter':{c.fillStyle=col;c.beginPath();c.moveTo(0,r);c.lineTo(-r*0.9,-r*0.6);c.lineTo(0,-r*0.3);c.lineTo(r*0.9,-r*0.6);c.closePath();c.fill();c.fillStyle='#10203a';c.fillRect(-r*0.2,-r*0.2,r*0.4,r*0.5);break;}
  case 'drone':{c.fillStyle=col;c.beginPath();c.arc(0,0,r,0,7);c.fill();c.fillStyle='#10203a';c.beginPath();c.arc(0,0,r*0.45,0,7);c.fill();c.fillStyle=col;c.beginPath();c.arc(0,0,r*0.2,0,7);c.fill();break;}
  case 'bomber':{c.fillStyle=col;c.beginPath();c.ellipse(0,0,r,r*0.8,0,0,7);c.fill();c.fillStyle='#10203a';c.beginPath();c.arc(0,r*0.3,r*0.3,0,7);c.fill();eye(r*0.4,-r*0.2,r*0.18);break;}
  case 'gunship':{c.fillStyle=col;c.beginPath();c.moveTo(-r,0);c.lineTo(-r*0.5,-r*0.7);c.lineTo(r*0.5,-r*0.7);c.lineTo(r,0);c.lineTo(r*0.5,r*0.6);c.lineTo(-r*0.5,r*0.6);c.closePath();c.fill();c.fillStyle='#ff5a6a';c.fillRect(-r*0.7,r*0.2,r*0.3,r*0.3);c.fillRect(r*0.4,r*0.2,r*0.3,r*0.3);eye(r*0.3,-r*0.3,r*0.14);break;}
  case 'weaver':{c.fillStyle=col;c.save();c.rotate(wob*0.2);c.beginPath();c.moveTo(0,-r);c.lineTo(r,0);c.lineTo(0,r);c.lineTo(-r,0);c.closePath();c.fill();c.restore();c.fillStyle='#10203a';c.beginPath();c.arc(0,0,r*0.3,0,7);c.fill();break;}
  case 'sniper':{c.fillStyle=col;c.beginPath();c.moveTo(0,-r);c.lineTo(r*0.7,r*0.7);c.lineTo(-r*0.7,r*0.7);c.closePath();c.fill();c.strokeStyle='#fff';c.lineWidth=1.5;c.beginPath();c.arc(0,0,r*0.4,0,7);c.moveTo(-r*0.4,0);c.lineTo(r*0.4,0);c.moveTo(0,-r*0.4);c.lineTo(0,r*0.4);c.stroke();break;}
  case 'core':{c.fillStyle=col;c.beginPath();c.arc(0,0,r,0,7);c.fill();c.strokeStyle='#fff';c.lineWidth=2;for(let k=0;k<6;k++){const a=k/6*Math.PI*2+(e.wig||0);c.beginPath();c.moveTo(0,0);c.lineTo(Math.cos(a)*r,Math.sin(a)*r);c.stroke();}c.fillStyle='#fff';c.beginPath();c.arc(0,0,r*0.3,0,7);c.fill();break;}
  case 'crawler':{c.fillStyle=col;for(let k=-1;k<=1;k++){c.beginPath();c.arc(k*r*0.5,wob*0.3,r*0.5,0,7);c.fill();}eye(r*0.2,-r*0.3,r*0.12);break;}
  case 'jelly':{c.fillStyle=col;c.globalAlpha=0.85;c.beginPath();c.arc(0,-r*0.2,r,Math.PI,0);for(let k=0;k<3;k++){const bx=r-k*r;c.lineTo(bx,r*0.5+Math.sin((e.wig||0)+k)*r*0.2);}c.closePath();c.fill();c.globalAlpha=1;eye(r*0.3,-r*0.2,r*0.15);break;}
  case 'parasite':{c.fillStyle=col;c.beginPath();c.ellipse(0,0,r*0.7,r,wob*0.1,0,7);c.fill();c.strokeStyle=col;c.lineWidth=2;for(let k=-1;k<=1;k+=2){c.beginPath();c.moveTo(k*r*0.5,0);c.lineTo(k*r,-r*0.6);c.stroke();}eye(r*0.25,-r*0.3,r*0.13);break;}
  case 'eyeball':{c.fillStyle='#fff';c.beginPath();c.arc(0,0,r,0,7);c.fill();c.fillStyle=col;c.beginPath();c.arc(0,0,r*0.6,0,7);c.fill();c.fillStyle='#10203a';c.beginPath();c.arc(Math.sin(e.wig||0)*r*0.2,0,r*0.3,0,7);c.fill();c.strokeStyle='#c04a6a';c.lineWidth=1;for(let k=0;k<6;k++){const a=k/6*Math.PI*2;c.beginPath();c.moveTo(Math.cos(a)*r*0.6,Math.sin(a)*r*0.6);c.lineTo(Math.cos(a)*r,Math.sin(a)*r);c.stroke();}break;}
  case 'blob':{c.fillStyle=col;c.globalAlpha=0.9;c.beginPath();for(let k=0;k<8;k++){const a=k/8*Math.PI*2;const rr=r*(0.85+Math.sin((e.wig||0)+k)*0.12);c.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);}c.closePath();c.fill();c.globalAlpha=1;eye(r*0.3,-r*0.1,r*0.16);break;}
  case 'mawworm':{c.fillStyle=col;for(let k=0;k<3;k++){c.beginPath();c.arc(0,k*r*0.4-r*0.3,r*0.6-k*r*0.1,0,7);c.fill();}c.fillStyle='#10203a';c.beginPath();c.arc(0,-r*0.5,r*0.3,0,Math.PI);c.fill();break;}
  case 'spitter':{c.fillStyle=col;c.beginPath();c.moveTo(0,r);c.lineTo(-r,0);c.lineTo(0,-r*0.8);c.lineTo(r,0);c.closePath();c.fill();c.fillStyle='#10203a';c.beginPath();c.arc(0,r*0.2,r*0.25,0,7);c.fill();break;}
  case 'ghoul':{c.fillStyle=col;c.globalAlpha=0.9;c.beginPath();c.arc(0,-r*0.1,r,Math.PI,0);c.lineTo(r*0.6,r*0.7);c.lineTo(0,r*0.4);c.lineTo(-r*0.6,r*0.7);c.closePath();c.fill();c.globalAlpha=1;c.fillStyle='#10203a';c.beginPath();c.arc(-r*0.35,-r*0.1,r*0.16,0,7);c.arc(r*0.35,-r*0.1,r*0.16,0,7);c.fill();break;}
  case 'tentacle':{c.fillStyle=col;c.beginPath();c.arc(0,-r*0.3,r*0.7,0,7);c.fill();c.strokeStyle=col;c.lineWidth=3;for(let k=-1;k<=1;k++){c.beginPath();c.moveTo(k*r*0.4,0);c.quadraticCurveTo(k*r*0.4+Math.sin((e.wig||0)+k)*r*0.4,r*0.6,k*r*0.4,r);c.stroke();}eye(r*0.25,-r*0.35,r*0.13);break;}
  case 'brainling':{c.fillStyle=col;c.beginPath();c.arc(0,0,r,0,7);c.fill();c.strokeStyle='#a83a5a';c.lineWidth=2;for(let k=0;k<4;k++){c.beginPath();c.arc((k-1.5)*r*0.3,0,r*0.3,0,Math.PI);c.stroke();}eye(r*0.3,r*0.2,r*0.13);break;}
  case 'larva':{c.fillStyle=col;c.beginPath();c.ellipse(0,0,r*0.6,r,wob*0.15,0,7);c.fill();c.fillStyle='#10203a';c.beginPath();c.arc(0,-r*0.4,r*0.18,0,7);c.fill();break;}
  case 'goldrush':{c.shadowColor='#ffd23d';c.shadowBlur=18;c.fillStyle='#ffe14d';c.beginPath();for(let k=0;k<10;k++){const a=k/10*Math.PI*2;const rr=k%2?r*0.6:r;c.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);}c.closePath();c.fill();c.shadowBlur=0;c.fillStyle='#b8860b';c.font='bold '+(r*0.9)+'px serif';c.textAlign='center';c.textBaseline='middle';c.fillText('¥',0,0);break;}
  default:{c.fillStyle=col;c.beginPath();c.arc(0,0,r,0,7);c.fill();eye(r*0.3,-r*0.1,r*0.16);}
  }
  c.restore();};

Game.prototype.drawBoss=function(){const b=this.boss;const c=ctx;const cfg=b.cfg;const x=b.x,y=b.y,r=b.r,t=performance.now();const ph=b.phase||0;
  if(ph>=1&&!b.entering){c.save();c.globalAlpha=0.28+Math.sin(t*0.008)*0.18;const ac=ph>=2?'#ff2a4a':'#ff8a2a';
    c.strokeStyle=ac;c.lineWidth=3;c.shadowColor=ac;c.shadowBlur=16;
    c.beginPath();c.arc(x,y,r*(1.25+ph*0.1),0,7);c.stroke();c.restore();}
  c.save();c.translate(x,y);
  const ps=1+ph*0.08;c.scale(ps,ps);
  const TINT=['#000000','#ff6a1a','#9a0a2a'];
  let body=cfg.body;
  if(ph>=1)body=mixHex(cfg.body,TINT[ph],ph===1?0.45:0.62);
  const flash=(b.iframe>t&&Math.floor(t/60)%2===0);
  if(flash)body='#ffffff';
  c.shadowColor=ph>=2?'#ff2a4a':cfg.body;c.shadowBlur=b.entering?6:18+ph*8+(ph>=1?Math.sin(t*0.01)*6:0);
  c.fillStyle=body;
  const wob=Math.sin(t*0.003)*r*0.05;
  switch(cfg.shape){
  case 'geo':{c.beginPath();for(let k=0;k<6;k++){const a=k/6*Math.PI*2+t*0.0004;c.lineTo(Math.cos(a)*(r+wob),Math.sin(a)*(r+wob));}c.closePath();c.fill();break;}
  case 'tall':{c.beginPath();c.ellipse(0,0,r*0.8,r*1.15,0,0,7);c.fill();break;}
  case 'wide':{c.beginPath();c.ellipse(0,0,r*1.2,r*0.85,0,0,7);c.fill();break;}
  case 'blob':{c.beginPath();for(let k=0;k<10;k++){const a=k/10*Math.PI*2;const rr=r*(0.9+Math.sin(t*0.002+k)*0.1);c.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);}c.closePath();c.fill();break;}
  case 'ghost':{c.beginPath();c.arc(0,-r*0.1,r,Math.PI,0);for(let k=0;k<5;k++){const bx=r-k*(r*2/5);c.lineTo(bx,r*0.7+Math.sin(t*0.004+k)*r*0.15);c.lineTo(bx-r*0.2,r*0.5);}c.closePath();c.fill();break;}
  case 'multi':{for(let k=0;k<5;k++){const a=k/5*Math.PI*2+t*0.0006;c.beginPath();c.arc(Math.cos(a)*r*0.5,Math.sin(a)*r*0.5,r*0.55,0,7);c.fill();}c.beginPath();c.arc(0,0,r*0.7,0,7);c.fill();break;}
  default:{c.beginPath();c.arc(0,0,r,0,7);c.fill();}
  }
  if(ph>=1){c.shadowBlur=0;c.fillStyle=ph>=2?'#ff2f44':mixHex(cfg.blotch,'#ff5a2a',0.5);
    const spikes=ph*6;for(let k=0;k<spikes;k++){const a=k/spikes*Math.PI*2+t*0.0006;const r1=r*0.92,r2=r*(1.2+ph*0.1+Math.sin(t*0.006+k)*0.05);
      c.beginPath();c.moveTo(Math.cos(a-0.09)*r1,Math.sin(a-0.09)*r1);c.lineTo(Math.cos(a)*r2,Math.sin(a)*r2);c.lineTo(Math.cos(a+0.09)*r1,Math.sin(a+0.09)*r1);c.closePath();c.fill();}}
  c.shadowBlur=0;c.fillStyle=ph>=2?mixHex(cfg.blotch,'#ff2a2a',0.4):cfg.blotch;c.globalAlpha=0.7;
  for(let k=0;k<5;k++){const a=k*1.3+t*0.0003;const d=r*0.5;c.beginPath();c.arc(Math.cos(a)*d,Math.sin(a)*d,r*0.16,0,7);c.fill();}
  c.globalAlpha=1;
  c.strokeStyle=cfg.blotch;c.fillStyle=cfg.blotch;c.lineWidth=4;
  if(cfg.extra==='horns'){c.fillStyle='#ffe14d';c.beginPath();c.moveTo(-r*0.6,-r*0.7);c.lineTo(-r*0.45,-r*1.3);c.lineTo(-r*0.25,-r*0.78);c.fill();c.beginPath();c.moveTo(r*0.6,-r*0.7);c.lineTo(r*0.45,-r*1.3);c.lineTo(r*0.25,-r*0.78);c.fill();}
  else if(cfg.extra==='tentacles'){for(let k=-2;k<=2;k++){c.beginPath();c.moveTo(k*r*0.35,r*0.5);c.quadraticCurveTo(k*r*0.35+Math.sin(t*0.004+k)*r*0.3,r,k*r*0.35,r*1.4);c.stroke();}}
  else if(cfg.extra==='crown'){c.fillStyle='#ffd23d';c.beginPath();for(let k=0;k<5;k++){const px=-r*0.6+k*r*0.3;c.lineTo(px,-r*0.9);c.lineTo(px+r*0.15,-r*1.2);}c.lineTo(r*0.6,-r*0.9);c.closePath();c.fill();}
  else if(cfg.extra==='brain'){c.strokeStyle='#fff';c.lineWidth=2;c.globalAlpha=0.5;for(let k=0;k<5;k++){c.beginPath();c.arc((k-2)*r*0.3,-r*0.3,r*0.25,0,Math.PI);c.stroke();}c.globalAlpha=1;}
  else if(cfg.extra==='neon'){c.shadowColor=cfg.body;c.shadowBlur=16;c.strokeStyle='#fff';c.lineWidth=2;c.globalAlpha=0.5+Math.sin(t*0.005)*0.4;c.beginPath();c.arc(0,0,r*1.05,0,7);c.stroke();c.shadowBlur=0;c.globalAlpha=1;}
  else if(cfg.extra==='hair'){c.strokeStyle=cfg.blotch;for(let k=0;k<9;k++){const px=-r*0.8+k*r*0.2;c.beginPath();c.moveTo(px,-r*0.5);c.quadraticCurveTo(px+Math.sin(t*0.003+k)*r*0.2,r*0.5,px,r*1.2);c.stroke();}}
  else if(cfg.extra==='veins'){c.strokeStyle='#ff6a8a';c.lineWidth=2;c.globalAlpha=0.6;for(let k=0;k<6;k++){const a=k*1.05;c.beginPath();c.moveTo(0,0);c.lineTo(Math.cos(a)*r,Math.sin(a)*r);c.stroke();}c.globalAlpha=1;}
  else if(cfg.extra==='drip'){c.fillStyle=cfg.blotch;for(let k=-2;k<=2;k++){const dy=r*0.7+(Math.sin(t*0.003+k)+1)*r*0.2;c.beginPath();c.arc(k*r*0.4,dy,r*0.1,0,7);c.fill();}}
  else if(cfg.extra==='segments'){c.strokeStyle=cfg.blotch;c.lineWidth=3;for(let k=1;k<=3;k++){c.beginPath();c.arc(0,0,r*k*0.3,0,7);c.stroke();}}
  if(ph>=2){c.strokeStyle='#ffd23d';c.shadowColor='#ff3a00';c.shadowBlur=8;c.lineWidth=2;c.globalAlpha=0.7+Math.sin(t*0.01)*0.3;
    for(let k=0;k<4;k++){const a=k*1.7+0.4;let px=Math.cos(a)*r*0.2,py=Math.sin(a)*r*0.2;c.beginPath();c.moveTo(px,py);
      for(let s=1;s<=4;s++){const w2=Math.sin(t*0.004+k*2+s)*0.5;px+=Math.cos(a+w2)*r*0.22;py+=Math.sin(a+w2)*r*0.22;c.lineTo(px,py);}c.stroke();}
    c.globalAlpha=1;c.shadowBlur=0;}
  c.shadowBlur=0;const ne=cfg.eyes;const er=r*0.18;
  const pupCol=ph>=2?'#ff2020':ph>=1?'#7a1020':'#10203a';
  for(let k=0;k<ne;k++){const ex=(ne===1)?0:(-r*0.4+k*(r*0.8/(ne-1)));const ey=-r*0.15;
    if(ph>=1){c.shadowColor='#ff2a2a';c.shadowBlur=ph>=2?10:5;}
    c.fillStyle=ph>=2?'#ffdede':'#fff';c.beginPath();c.arc(ex,ey,er,0,7);c.fill();
    c.shadowBlur=0;c.fillStyle=pupCol;c.beginPath();c.arc(ex+Math.sin(t*0.002)*er*0.3,ey,er*0.55,0,7);c.fill();}
  c.fillStyle='#10203a';
  if(cfg.mouth==='teeth'){c.beginPath();c.arc(0,r*0.35,r*0.4,0,Math.PI);c.fill();c.fillStyle='#fff';for(let k=0;k<5;k++){const mx=-r*0.32+k*r*0.16;c.beginPath();c.moveTo(mx,r*0.35);c.lineTo(mx+r*0.08,r*0.55);c.lineTo(mx+r*0.16,r*0.35);c.fill();}}
  else if(cfg.mouth==='gape'){c.beginPath();c.ellipse(0,r*0.4,r*0.3,r*0.22,0,0,7);c.fill();c.fillStyle=ph>=1?'#ff2a3a':'#ff5a6a';c.beginPath();c.ellipse(0,r*0.45,r*0.16,r*0.1,0,0,7);c.fill();}
  else if(cfg.mouth==='tongue'){c.beginPath();c.arc(0,r*0.35,r*0.3,0,Math.PI);c.fill();c.fillStyle='#ff6a8a';c.beginPath();c.ellipse(0,r*0.5,r*0.12,r*0.18,0,0,7);c.fill();}
  c.restore();
  const bw=Math.min(W*0.8,260),bx=W/2-bw/2,by=14;
  c.save();c.fillStyle='rgba(10,20,40,0.7)';c.fillRect(bx-2,by-2,bw+4,12);
  const fr=Math.max(0,b.hp/b.maxhp);
  c.fillStyle=b.entering?'#5a6a8a':(b.phase>=2?'#ff3d6e':b.phase>=1?'#ff8a3a':'#ffd23d');
  c.fillRect(bx,by,bw*fr,8);
  c.strokeStyle='#2a5a6a';c.lineWidth=1;c.strokeRect(bx-2,by-2,bw+4,12);
  c.strokeStyle='#0a1428';c.lineWidth=2;c.beginPath();c.moveTo(bx+bw*0.33,by);c.lineTo(bx+bw*0.33,by+8);c.moveTo(bx+bw*0.66,by);c.lineTo(bx+bw*0.66,by+8);c.stroke();
  c.fillStyle='#cfe0ff';c.font='bold 9px sans-serif';c.textAlign='center';c.textBaseline='bottom';
  c.fillText(cfg.name+(b.entering?'  ［降下中・無敵］':'  第'+(b.phase+1)+'形態'),W/2,by-3);
  c.restore();};

<script>

  }else if(which==='item'){
    h+='<div class="secTitle">？ガチャ箱から出るもの</div>';
    h+=card('🟠','火力UP','弾の威力が上がる(最大5)','#ff9f43');

    h+=card('🚫','武器ジャム','2.6秒のあいだ撃てなくなる。設置武器や必殺も止まる','#ff4d6a');

<script>
let AC=null,masterGain=null,musicGain=null,soundOn=false,musicOn=false;
function audioInit(){if(AC)return;try{AC=new (window.AudioContext||window.webkitAudioContext)();
  let out=AC.destination;
  try{const comp=AC.createDynamicsCompressor();comp.threshold.value=-16;comp.knee.value=20;comp.ratio.value=4;comp.attack.value=0.003;comp.release.value=0.2;comp.connect(AC.destination);out=comp;}catch(e){}
  masterGain=AC.createGain();masterGain.gain.value=0.6;masterGain.connect(out);
  musicGain=AC.createGain();musicGain.gain.value=0.5;musicGain.connect(out);}catch(e){AC=null;}}
function audioResume(){if(AC&&AC.state==='suspended'){try{AC.resume();}catch(e){}}}
function toggleSound(){audioInit();audioResume();soundOn=!soundOn;musicOn=soundOn;const sb=document.getElementById('soundBtn');
  if(sb)sb.textContent=soundOn?'\u266a \u97f3 ON':'\u266a \u97f3 OFF';
  if(!musicOn)stopMusic();else if(game.running)startMusic(game.stage,!!game.boss);}

function tone(f,d,type,g,delay){if(!AC||!soundOn)return;const t0=AC.currentTime+(delay||0);
  const o=AC.createOscillator(),gn=AC.createGain();o.type=type||'square';o.frequency.value=f;
  gn.gain.setValueAtTime(0,t0);gn.gain.linearRampToValueAtTime((g==null?0.3:g),t0+0.005);
  gn.gain.exponentialRampToValueAtTime(0.0006,t0+d);o.connect(gn);gn.connect(masterGain);o.start(t0);o.stop(t0+d+0.02);}
function blip(f,d,g,type,delay){if(!AC||!soundOn)return;const t0=AC.currentTime+(delay||0);
  const o=AC.createOscillator(),gn=AC.createGain();o.type=type||'square';o.frequency.value=f;
  gn.gain.setValueAtTime(0,t0);gn.gain.linearRampToValueAtTime((g==null?0.05:g),t0+0.004);
  gn.gain.exponentialRampToValueAtTime(0.0006,t0+d);o.connect(gn);gn.connect(masterGain);o.start(t0);o.stop(t0+d+0.02);}
function bell(f,d,g,delay){if(!AC||!soundOn)return;const t0=AC.currentTime+(delay||0);
  const o=AC.createOscillator(),gn=AC.createGain();o.type='sine';o.frequency.value=f;
  gn.gain.setValueAtTime(0,t0);gn.gain.linearRampToValueAtTime((g==null?0.12:g),t0+0.006);
  gn.gain.exponentialRampToValueAtTime(0.0005,t0+d);o.connect(gn);gn.connect(masterGain);o.start(t0);o.stop(t0+d+0.02);}
function sweep(f1,f2,d,type,g){if(!AC||!soundOn)return;const t0=AC.currentTime;
  const o=AC.createOscillator(),gn=AC.createGain();o.type=type||'sawtooth';
  o.frequency.setValueAtTime(f1,t0);o.frequency.exponentialRampToValueAtTime(Math.max(20,f2),t0+d);
  gn.gain.setValueAtTime(0,t0);gn.gain.linearRampToValueAtTime((g==null?0.25:g),t0+0.01);gn.gain.exponentialRampToValueAtTime(0.0006,t0+d);
  o.connect(gn);gn.connect(masterGain);o.start(t0);o.stop(t0+d+0.02);}
function noiseHit(d,g,freq){if(!AC||!soundOn)return;const t0=AC.currentTime;const n=Math.floor(AC.sampleRate*d);
  const buf=AC.createBuffer(1,n,AC.sampleRate);const dat=buf.getChannelData(0);for(let i=0;i<n;i++)dat[i]=(Math.random()*2-1)*(1-i/n);
  const src=AC.createBufferSource();src.buffer=buf;const gn=AC.createGain();gn.gain.value=(g==null?0.3:g);
  const flt=AC.createBiquadFilter();flt.type='bandpass';flt.frequency.value=freq||1200;src.connect(flt);flt.connect(gn);gn.connect(masterGain);src.start(t0);}

let _combo=0,_comboT=0;
const MAJ=[0,2,4,5,7,9,11,12];
function killChime(){const now=(typeof performance!=='undefined'?performance.now():Date.now());
  if(now-_comboT>1300)_combo=0;_comboT=now;
  const deg=_combo%MAJ.length,oct=Math.floor(_combo/MAJ.length)%3;
  const f=523.25*Math.pow(2,(MAJ[deg]+oct*12)/12);
  bell(f,0.22,0.16);bell(f*2,0.13,0.05,0.004);
  if(deg===MAJ.length-1)bell(f*1.5,0.26,0.07,0.02);
  _combo++;if(_combo>=MAJ.length*3)_combo=0;}

const SFX={
  fire(w,fam){if(!AC||!soundOn)return;const v=0.85+Math.random()*0.3;
    switch(fam){
    case 'rapid':blip(1180*v,0.032,0.04,'square');break;
    case 'heavy':blip(108,0.12,0.07,'sine');blip(70,0.13,0.045,'triangle');break;
    case 'spread':blip(660*v,0.05,0.038,'triangle');noiseHit(0.03,0.02,4200);break;
    case 'homing':{const t0=AC.currentTime;const o=AC.createOscillator(),gn=AC.createGain();o.type='sawtooth';
      o.frequency.setValueAtTime(680*v,t0);o.frequency.linearRampToValueAtTime(1120*v,t0+0.06);
      gn.gain.setValueAtTime(0.045,t0);gn.gain.exponentialRampToValueAtTime(0.0006,t0+0.08);o.connect(gn);gn.connect(masterGain);o.start(t0);o.stop(t0+0.1);break;}
    case 'special':sweep(520*v,1400*v,0.07,'square',0.04);break;
    case 'magnet':blip(175*v,0.08,0.05,'sine');blip(350*v,0.05,0.025,'triangle',0.005);break;
    case 'divine':bell(1600*v,0.14,0.05);break;
    default:blip(820*v,0.04,0.04,'square');}},
  explode(big){if(big){noiseHit(0.45,0.3,800);sweep(320,50,0.5,'sawtooth',0.28);
      [0,4,7,12].forEach((s,i)=>bell(523.25*Math.pow(2,s/12),0.3,0.12,i*0.04));return;}
    noiseHit(0.11,0.11,1700);killChime();},
  bossHit(){blip(140,0.06,0.12,'square');},
  bossAppear(){sweep(120,500,0.5,'sawtooth',0.3);tone(80,0.5,'sine',0.2);},
  enemyShot(){blip(320,0.05,0.06,'sawtooth');},
  playerHit(){sweep(400,80,0.3,'square',0.28);noiseHit(0.15,0.18,900);},
  heal(){bell(523,0.18,0.16);bell(784,0.2,0.14,0.08);},
  good(){bell(660,0.14,0.16);bell(990,0.16,0.13,0.06);},
  bad(){sweep(300,110,0.25,'square',0.2);},
  trap(){sweep(420,70,0.32,'sawtooth',0.3);noiseHit(0.22,0.22,520);blip(150,0.18,0.14,'square',0.02);},
  orb(){bell(1046,0.1,0.07);},
  option(){bell(700,0.12,0.1);bell(1050,0.13,0.08,0.05);},
  clear(){[523,659,784,1047].forEach((f,i)=>bell(f,0.28,0.16,i*0.09));},
  revive(){[392,523,659,880].forEach((f,i)=>bell(f,0.3,0.16,i*0.08));},
  weaponEvolve(lv){if(!AC||!soundOn)return;
    /* ドラえもん道具音風 + キュイーン上昇: 連続スイープ(芯) / 階段アルペジオ(粒) / 頂点和音(解決) / キラキラ余韻 + 締めスイープ。全体約2.1秒 */
    const key=Math.min(7,Math.floor((lv-1)/4));         /* Lvが上がるほど少し高い調に */
    const root=523.25*Math.pow(2,key/12);               /* C5を基準に移調 */
    const sc=[0,2,4,7,9,12,14,16,19];                    /* 長調の駆け上がり音階(9音に延長) */
    const run=AC.currentTime;
    const step=0.085;                                    /* 1音の間隔(ゆっくりめ) */
    const riseDur=sc.length*step;                        /* 助走の長さ */
    /* 0) キュイーン: 助走と並走する連続ピッチスイープ(これが滑らかな上昇感の芯) */
    const sweepUp=(type,f1,f2,dur,peak,delay)=>{const t0=run+(delay||0);
      const o=AC.createOscillator(),g=AC.createGain();o.type=type;
      o.frequency.setValueAtTime(f1,t0);o.frequency.exponentialRampToValueAtTime(f2,t0+dur);
      g.gain.setValueAtTime(0,t0);g.gain.linearRampToValueAtTime(peak,t0+dur*0.5);g.gain.exponentialRampToValueAtTime(0.0006,t0+dur+0.12);
      o.connect(g);g.connect(masterGain);o.start(t0);o.stop(t0+dur+0.14);};
    sweepUp('sawtooth',root*0.75,root*4,riseDur+0.06,0.10,0);   /* メインのキュイーン */
    sweepUp('sine',    root*1.5, root*6,riseDur+0.04,0.05,0.04); /* 上のきらめきを重ねる */
    /* 1) 助走: 階段アルペジオ(粒立ちの達成感。三角波+正弦の芯) */
    sc.forEach((semi,i)=>{const t=run+i*step;const f=root*Math.pow(2,semi/12);
      const o=AC.createOscillator(),g=AC.createGain();o.type='triangle';o.frequency.value=f;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.15,t+0.008);g.gain.exponentialRampToValueAtTime(0.0006,t+0.22);
      o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+0.24);
      const o2=AC.createOscillator(),g2=AC.createGain();o2.type='sine';o2.frequency.value=f;
      g2.gain.setValueAtTime(0,t);g2.gain.linearRampToValueAtTime(0.06,t+0.008);g2.gain.exponentialRampToValueAtTime(0.0005,t+0.17);
      o2.connect(g2);g2.connect(masterGain);o2.start(t);o2.stop(t+0.19);});
    /* 2) 解決: 頂点で明るいメジャー和音が長めに開く(キュイーンの着地) */
    const peak=run+riseDur+0.03;
    [0,4,7,12,16,19].forEach((semi,i)=>{const f=root*Math.pow(2,semi/12);
      const o=AC.createOscillator(),g=AC.createGain();o.type='triangle';o.frequency.value=f;
      g.gain.setValueAtTime(0,peak);g.gain.linearRampToValueAtTime(i===0?0.17:0.10,peak+0.014);
      g.gain.exponentialRampToValueAtTime(0.0005,peak+0.95);
      o.connect(g);g.connect(masterGain);o.start(peak);o.stop(peak+0.97);});
    /* 低音の支え(和音に厚み) */
    {const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.value=root*0.5;
      g.gain.setValueAtTime(0,peak);g.gain.linearRampToValueAtTime(0.14,peak+0.02);g.gain.exponentialRampToValueAtTime(0.0005,peak+0.8);
      o.connect(g);g.connect(masterGain);o.start(peak);o.stop(peak+0.82);}
    /* 3) 余韻: 高音のキラキラ(5粒に増量) */
    [0,0.1,0.22,0.36,0.5].forEach((dl,i)=>{const t=peak+0.2+dl;const f=root*Math.pow(2,(19+i*2)/12);
      const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.055,t+0.006);g.gain.exponentialRampToValueAtTime(0.0004,t+0.45);
      o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+0.47);});
    /* 4) 締め: もう一段上へ抜ける短いキュイーン(余韻の最後にもう一押し) */
    sweepUp('sine',root*3,root*7,0.4,0.05,riseDur+0.55);},
  ultimate(){[440,554,659,880].forEach((f,i)=>blip(f,0.16,0.12,'sawtooth',i*0.05));},
  powerEsc(n){blip(400+n*120,0.1,0.12,'square');},
  heatPing(){bell(1568,0.06,0.045);},
  whip(){sweep(900,200,0.18,'sawtooth',0.2);noiseHit(0.1,0.1,2500);},
  funnelCharge(){if(!AC||!soundOn)return;const t0=AC.currentTime;
    for(let k=0;k<3;k++){const o=AC.createOscillator(),gn=AC.createGain();o.type='triangle';
      o.frequency.setValueAtTime(300+k*120,t0);o.frequency.exponentialRampToValueAtTime(1500+k*300,t0+0.55);
      gn.gain.setValueAtTime(0,t0);gn.gain.linearRampToValueAtTime(0.1,t0+0.05);gn.gain.exponentialRampToValueAtTime(0.001,t0+0.6);
      o.connect(gn);gn.connect(masterGain);o.start(t0);o.stop(t0+0.62);}
    tone(2000,0.08,'sine',0.09,0.5);},
  specialFire(sp){sweep(200,1000,0.3,'sawtooth',0.26);[523,659,784,1047,1318].forEach((f,i)=>bell(f,0.22,0.16,i*0.04));noiseHit(0.25,0.16,1400);},
  maxRainbow(){[523,659,784,988,1175,1318,1568].forEach((f,i)=>bell(f,0.26,0.16,i*0.05));sweep(400,2000,0.7,'sine',0.13);},
};
/* ===== BGM: 16小節(=256ステップ)の記憶に残るフック =====
   構成: A(1-2) / A'(3-4) / Aの反復(5-8) / 盛り上がるブリッジ(9-12, 最高音を保持) / 再現+締め(13-16)
   各ステージで調と音色を変化させ、ボスでは短調寄せ+速く。
   LEAD: [step(0-255), 半音(基準音からの相対), 長さ(16分単位)] */
const LEAD=[
  /* A 1-2小節: フック主題(上行→跳躍→解決) */
  [0,0,2],[2,4,2],[4,7,2],[6,12,4],[10,11,2],[12,7,2],[14,9,4],
  [16,7,2],[18,4,2],[20,5,2],[22,7,4],[26,4,2],[28,2,2],[30,0,4],
  /* A' 3-4小節: 主題を半終止で変化 */
  [32,0,2],[34,4,2],[36,7,2],[38,12,4],[42,14,2],[44,12,2],[46,11,4],
  [48,9,2],[50,7,2],[52,5,2],[54,4,4],[58,5,2],[60,7,2],[62,7,4],
  /* 5-8小節: A主題の反復(耳に焼き付ける) */
  [64,0,2],[66,4,2],[68,7,2],[70,12,4],[74,11,2],[76,7,2],[78,9,4],
  [80,7,2],[82,4,2],[84,5,2],[86,7,4],[90,4,2],[92,2,2],[94,0,4],
  /* 9-12小節: ブリッジ(駆け上がり、最高音19を保持して開放感) */
  [96,7,2],[98,9,2],[100,11,2],[102,12,2],[104,14,4],[108,16,4],
  [112,17,2],[114,16,2],[116,14,2],[118,12,4],[122,14,2],[124,16,4],
  [128,12,2],[130,14,2],[132,16,2],[134,17,2],[136,19,8],
  [144,17,4],[148,16,4],[152,14,4],[156,12,4],
  /* 13-16小節: 主題の再現と締め(ボタン的フレーズで一巡) */
  [160,0,2],[162,4,2],[164,7,2],[166,12,4],[170,11,2],[172,7,2],[174,9,4],
  [176,7,2],[178,4,2],[180,5,2],[182,7,4],[186,9,2],[188,11,2],[190,12,4],
  [192,12,2],[194,11,2],[196,9,2],[198,7,4],[202,5,2],[204,4,2],[206,2,4],
  [208,0,2],[210,4,2],[212,7,2],[214,12,4],[218,7,2],[220,4,2],[222,0,6],
  [232,7,2],[234,7,2],[236,7,2],[238,0,8],
];
/* 16小節ぶんのコード根(各小節1つ): I-V-vi-IV系で覚えやすく */
const CHORDS16=[0,7,9,5, 0,7,9,5, 5,9,0,7, 0,7,5,7];
/* ステージごとの移調(半音)と音色 */
const STAGE_KEY=[0,2,-2,3,5,-4,7,-1,4,-5,1,6,-3,8,5,-6,2,7,4,9];
const STAGE_WAVE=['triangle','triangle','square','triangle','sawtooth','square','triangle','triangle','sawtooth','square','triangle','sawtooth','square','triangle','triangle','square','sawtooth','triangle','triangle','sawtooth'];
let _musicTimer=null,_nextT=0,_s16=0,_mStage=0,_mBoss=false,_leadMap=null,_mWave='triangle',_mKey=0;
function buildLeadMap(){_leadMap={};for(const ev of LEAD){_leadMap[ev[0]]=ev;}}
function mnote(f,dur,peak,type,t){if(!AC)return;const o=AC.createOscillator(),gn=AC.createGain();o.type=type;o.frequency.value=f;
  gn.gain.setValueAtTime(0,t);gn.gain.linearRampToValueAtTime(peak,t+0.012);gn.gain.exponentialRampToValueAtTime(0.0006,t+dur);
  o.connect(gn);gn.connect(musicGain);o.start(t);o.stop(t+dur+0.02);}
function mkick(t){if(!AC)return;const o=AC.createOscillator(),gn=AC.createGain();o.type='sine';
  o.frequency.setValueAtTime(155,t);o.frequency.exponentialRampToValueAtTime(45,t+0.12);
  gn.gain.setValueAtTime(0.34,t);gn.gain.exponentialRampToValueAtTime(0.0006,t+0.16);o.connect(gn);gn.connect(musicGain);o.start(t);o.stop(t+0.18);}
function msnare(t){if(!AC)return;const n=Math.floor(0.12*AC.sampleRate);const buf=AC.createBuffer(1,n,AC.sampleRate);const d=buf.getChannelData(0);
  for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);const s=AC.createBufferSource();s.buffer=buf;
  const f=AC.createBiquadFilter();f.type='highpass';f.frequency.value=1800;const g=AC.createGain();
  g.gain.setValueAtTime(0.16,t);g.gain.exponentialRampToValueAtTime(0.0005,t+0.12);s.connect(f);f.connect(g);g.connect(musicGain);s.start(t);}
function mhat(t){if(!AC)return;const n=Math.floor(0.02*AC.sampleRate);const buf=AC.createBuffer(1,n,AC.sampleRate);const d=buf.getChannelData(0);
  for(let i=0;i<n;i++)d[i]=(Math.random()*2-1);const s=AC.createBufferSource();s.buffer=buf;
  const f=AC.createBiquadFilter();f.type='highpass';f.frequency.value=7800;const g=AC.createGain();
  g.gain.setValueAtTime(0.05,t);g.gain.exponentialRampToValueAtTime(0.0004,t+0.04);s.connect(f);f.connect(g);g.connect(musicGain);s.start(t);}
function scheduleStep(s16,t){
  const base=(_mBoss?(146.83):174.61)*Math.pow(2,(_mKey+(_mBoss?-3:0))/12);
  const mf=(semi)=>base*Math.pow(2,semi/12);
  const bar=Math.floor(s16/16)%16;const rs=CHORDS16[bar];
  const ev=_leadMap&&_leadMap[s16%256];
  if(ev){const semi=ev[1];const dur=ev[2]*(_mBoss?0.115:0.14)*0.92;
    mnote(mf(semi+12),dur,0.085,_mWave,t);
    if(ev[1]>=12)mnote(mf(semi+24),dur*0.6,0.03,'sine',t);}
  if(s16%4===0)mnote(mf(rs-12),(_mBoss?0.22:0.26),0.09,'sine',t);
  if(s16%8===0)mnote(mf(rs-12),0.12,0.05,'triangle',t+0.0001);
  if(s16%8===0)mkick(t);
  if(s16%8===4)msnare(t);
  if(s16%2===1)mhat(t);}
function musicTick(){if(!musicOn||!AC){stopMusic();return;}
  const sixteenth=Math.max(0.10,(_mBoss?0.118:0.140)-_mStage*0.0011);
  let guard=0;
  while(_nextT<AC.currentTime+0.12&&guard++<32){try{scheduleStep(_s16,_nextT);}catch(e){}_nextT+=sixteenth;_s16++;if(_s16>=256)_s16=0;}}
function startMusic(stage,boss){stopMusic();if(!musicOn||!AC)return;
  _mStage=stage||0;_mBoss=!!boss;_s16=0;_mKey=STAGE_KEY[_mStage%STAGE_KEY.length]||0;
  _mWave=_mBoss?'square':(STAGE_WAVE[_mStage%STAGE_WAVE.length]||'triangle');
  if(!_leadMap)buildLeadMap();
  _nextT=AC.currentTime+0.06;
  _musicTimer=setInterval(musicTick,40);}
function stopMusic(){if(_musicTimer){clearInterval(_musicTimer);_musicTimer=null;}}
</script>
<script>
const cvEl=document.getElementById('cv');
let dragging=false,anchorX=0,anchorY=0,meAnchorX=0,meAnchorY=0;const MOVE_GAIN=1.18;
function ptr(e){const r=cvEl.getBoundingClientRect();const src=e.touches&&e.touches[0]?e.touches[0]:e;return {x:src.clientX-r.left,y:src.clientY-r.top};}
function downH(e){if(!game.running)return;e.preventDefault();audioResume();const p=ptr(e);dragging=true;anchorX=p.x;anchorY=p.y;meAnchorX=game.me.x;meAnchorY=game.me.y;}
function moveH(e){if(!dragging||!game.running)return;e.preventDefault();const p=ptr(e);
  game.target.x=meAnchorX+(p.x-anchorX)*MOVE_GAIN;game.target.y=meAnchorY+(p.y-anchorY)*MOVE_GAIN;}
function upH(){dragging=false;}
cvEl.addEventListener('touchstart',downH,{passive:false});
cvEl.addEventListener('touchmove',moveH,{passive:false});
cvEl.addEventListener('touchend',upH);cvEl.addEventListener('touchcancel',upH);
cvEl.addEventListener('mousedown',downH);window.addEventListener('mousemove',moveH);window.addEventListener('mouseup',upH);

let keyBuf='';
window.addEventListener('keydown',e=>{const k=(e.key||'').toLowerCase();
  if(game.running){const step=24;
    if(k==='arrowleft'||k==='a'){game.target.x-=step;}
    else if(k==='arrowright'||k==='d'){game.target.x+=step;}
    else if(k==='arrowup'||k==='w'){game.target.y-=step;}
    else if(k==='arrowdown'||k==='s'){game.target.y+=step;}
    else if(k===' '||k==='z'){e.preventDefault();game.fireSpecial();}}
  if(/^[a-z]$/.test(k)){keyBuf=(keyBuf+k).slice(-8);
    if(keyBuf.endsWith('valk')){unlockValk();game.toast('ヴァルキリー解放','#ff8aff');}
    if(keyBuf.endsWith('magni')){unlockMagni();game.toast('マグニーター解放','#8aa8ff');}
    if(keyBuf.endsWith('frey')){unlockFrey();game.toast('フレイ解放','#ffe88a');}
    if(keyBuf.endsWith('cheat')){toggleCheat();keyBuf='';}}
});

const titleEl=document.querySelector('.title');
if(titleEl)titleEl.addEventListener('click',()=>{const n=performance.now();if(n-_logoT>1200)_logoTaps=0;_logoT=n;_logoTaps++;
  if(_logoTaps>=13){_logoTaps=0;toggleCheat();}});

window.addEventListener('load',()=>{layout();renderCharPick();});
layout();renderCharPick();
</script>
