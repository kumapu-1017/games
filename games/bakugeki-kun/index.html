<style>

  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;width:100%;background:#0a1428;color:var(--ink);overflow:hidden;

  .title small{font-size:7px;color:var(--dim);letter-spacing:.3em;display:block;font-family:monospace}

  #stageTag{font-size:10px;font-weight:800;color:#8affff;padding:2px 6px;border:1px solid #2a5a6a;border-radius:9px;white-space:nowrap}
  #ticket{color:#8affff;font-size:12px;white-space:nowrap}

  .wslot.bad{border-color:var(--red);color:var(--red);background:rgba(255,77,106,.1)}

  .wlv .lvbar{display:flex;gap:2px}
  .wlv .seg{width:9px;height:11px;border-radius:2px;background:#22344e;transition:background .15s ease,box-shadow .15s ease}

  .wlv .seg.max{background:#ff8aff;box-shadow:0 0 6px #ff8aff}

  canvas{display:block;border-radius:10px}
  #flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:15;border-radius:10px}
  #toast{position:absolute;top:13%;left:50%;transform:translateX(-50%);font-size:16px;font-weight:800;
    padding:5px 14px;border-radius:18px;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;z-index:16;white-space:nowrap}
  #toast.show{animation:tp 1.2s ease}
  #lvup{position:absolute;top:34%;left:50%;transform:translateX(-50%) scale(.5);font-weight:800;
    text-align:center;opacity:0;pointer-events:none;z-index:17;white-space:nowrap}
  #lvup .lt{font-size:13px;letter-spacing:.3em;color:#fff}
  #lvup .ln{font-size:30px;background:linear-gradient(90deg,#6effe0,#ffd23d,#ff8aff);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 30px rgba(255,210,61,.6)}
  #lvup.show{animation:lv 1.5s cubic-bezier(.2,1.4,.4,1)}
  @keyframes lv{0%{opacity:0;transform:translateX(-50%) scale(.4) rotate(-6deg)}25%{opacity:1;transform:translateX(-50%) scale(1.15) rotate(2deg)}45%{transform:translateX(-50%) scale(1) rotate(0)}80%{opacity:1}100%{opacity:0;transform:translateX(-50%) scale(1.05)}}
  #soundBtn{position:absolute;top:8px;left:8px;z-index:18;font-size:10px;font-weight:800;color:#8affff;background:rgba(10,20,40,.6);border:1px solid #2a5a6a;border-radius:9px;padding:4px 8px;cursor:pointer}
  #soundBtn:active{transform:scale(.95)}
  #pauseBtn{position:absolute;top:8px;right:8px;z-index:18;font-size:11px;font-weight:800;color:#8affff;background:rgba(10,20,40,.6);border:1px solid #2a5a6a;border-radius:9px;padding:4px 10px;cursor:pointer;display:none;font-family:inherit}
  #pauseBtn.show{display:block}
  #pauseBtn:active{transform:scale(.95)}
  #spWrap{position:absolute;left:50%;bottom:10px;transform:translateX(-50%);z-index:19;display:flex;flex-direction:column;align-items:center;gap:4px;pointer-events:none}
  #spGauge{position:relative;width:168px;height:10px;border-radius:6px;background:rgba(10,20,40,.65);border:1px solid #2a5a6a;overflow:hidden}
  #spGauge::after{content:'';position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(90deg,transparent 32.4%,rgba(255,255,255,.55) 33%,transparent 33.6%,transparent 65.7%,rgba(255,255,255,.55) 66.3%,transparent 66.9%)}
  #spFill{height:100%;width:0%;background:linear-gradient(90deg,#6effe0,#ffd23d,#ff8aff);transition:width .12s linear}
  #spBtn{pointer-events:auto;display:none;font-size:14px;font-weight:800;color:#0a1428;border:none;border-radius:20px;padding:10px 24px;font-family:inherit;cursor:pointer;
    background:linear-gradient(135deg,#ff8aff,#ffd23d,#6effe0);background-size:200% 200%;box-shadow:0 0 18px rgba(255,210,61,.6);animation:spPulse 1s ease-in-out infinite,spFlow 3s linear infinite}
  #spBtn.ready{display:block}
  #spBtn:active{transform:scale(.95)}
  @keyframes spPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
  @keyframes spFlow{0%{background-position:0% 50%}100%{background-position:200% 50%}}
  @keyframes tp{0%{opacity:0;transform:translateX(-50%) scale(.6)}20%{opacity:1}80%{opacity:1}100%{opacity:0}}
  #hint{width:100%;max-width:600px;padding:3px 16px;font-size:10px;color:var(--dim);text-align:center}
  .panel{position:absolute;inset:0;background:rgba(10,20,40,.94);border-radius:10px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:11px;z-index:20;text-align:center}
  .panel.hide{display:none}
  .big{font-size:24px;font-weight:800}
  .sub{font-size:12px;color:var(--dim);line-height:1.8;padding:0 24px}
  .sub b{color:var(--ink)} .sub .g{color:var(--gold)}
  button.go{background:linear-gradient(135deg,var(--me),var(--gold));color:#0a1428;border:none;border-radius:12px;
    padding:13px 30px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer}
  button.go:active{transform:scale(.96)}
  button.ghost{background:transparent;color:#8affff;border:1.5px solid #2a5a6a;border-radius:10px;padding:9px 18px;font-size:12px;font-weight:800;font-family:inherit;cursor:pointer}
  button.ghost:active{transform:scale(.96)}
  #helpScreen,#releaseScreen{position:absolute;inset:0;background:rgba(8,16,32,.98);border-radius:10px;display:none;flex-direction:column;z-index:30}

  .relVer{font-size:14px;font-weight:800;color:#ffd23d;display:flex;align-items:center;gap:8px}
  .relVer .newTag{font-size:9px;font-weight:800;color:#0a1428;background:#6effe0;border-radius:6px;padding:1px 6px;letter-spacing:.08em}
  .relItem{font-size:12px;color:var(--ink);line-height:1.6;padding:3px 0 3px 14px;position:relative}
  .relItem::before{content:'•';position:absolute;left:2px;color:#8affff}
  .helpHead{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 8px;border-bottom:1px solid #1c2c4a}
  .helpHead .ht{font-size:16px;font-weight:800;color:#ffd23d}
  .helpScroll{flex:1;overflow-y:auto;padding:10px 12px 24px;-webkit-overflow-scrolling:touch}
  .helpTabs{display:flex;gap:6px;padding:8px 12px;flex-wrap:wrap}
  .helpTabs button{flex:1;min-width:60px;padding:8px 4px;border-radius:9px;border:1.5px solid #2a3a5a;background:transparent;color:#7a90b0;font-weight:800;font-size:11px;font-family:inherit;cursor:pointer}
  .helpTabs button.on{border-color:#6effe0;color:#6effe0;background:rgba(110,255,224,.1)}
  .card{display:flex;gap:10px;align-items:flex-start;background:rgba(255,255,255,.03);border:1px solid #1c2c4a;border-radius:10px;padding:9px 10px;margin-bottom:7px}

  .card .nm{font-size:13px;font-weight:800}
  .card .ds{font-size:11px;color:#7a90b0;line-height:1.5;margin-top:2px}
  .secTitle{font-size:11px;color:#8affff;font-weight:800;letter-spacing:.1em;margin:10px 2px 6px}
  .lock{opacity:.55;position:relative}
  .lockTag{position:absolute;top:6px;right:8px;font-size:9px;font-weight:800;color:#ffd23d;border:1px solid #ffd23d;border-radius:7px;padding:1px 5px}

  #verBadge{font-size:10px;font-weight:800;color:#8affff;letter-spacing:.08em;font-family:monospace;

</style>

<header>

    <div style="font-size:11px;color:#ffd23d;font-weight:800">▼ キャラを選ぶ ▼</div>

      <button class="go" onclick="game.start()">発進</button>
      <button class="ghost" onclick="openHelp()">スキル図鑑</button>
    </div>
    <button class="ghost" style="font-size:10px;padding:6px 12px;border-color:#5a3a3a;color:#c88" onclick="resetUnlocks()">解放をリセット(友人に渡す前に鍵をかける)</button>
    <button class="ghost" style="position:absolute;right:10px;bottom:10px;font-size:9px;padding:4px 10px;border-color:#2a3a5a;color:#7a90b0;letter-spacing:.05em" onclick="openRelease()">更新履歴</button>
  </div>

  <div class="panel hide" id="clearScreen">
    <div class="big" style="color:#ffd23d" id="clearTitle">ステージ クリア!</div>
    <div class="sub" id="clearInfo"></div>
    <button class="go" onclick="game.nextStage()">次のステージへ</button>
  </div>

  <div class="panel hide" id="pauseScreen">
    <div class="big" style="color:#8affff">ポーズ</div>
    <div class="sub">休憩中だよ。準備できたら続きをどうぞ。</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
      <button class="go" onclick="game.resumeGame()">続ける</button>
      <button class="ghost" onclick="game.toTitle()">タイトルに戻る</button>
    </div>
  </div>

  <div class="panel hide" id="reviveScreen">
    <div class="big" style="color:#8affff">撃墜</div>
    <div class="sub" id="reviveInfo"></div>
    <div style="font-size:12px;color:#ffd23d;font-weight:800">出撃チケットを使う</div>
    <button class="go" onclick="game.reviveGo()">戦線復帰</button>
  </div>

  <div id="releaseScreen">
    <div class="helpHead">
      <div class="ht">更新履歴</div>
      <button class="ghost" onclick="closeRelease()">もどる</button>
    </div>
    <div class="helpScroll" id="releaseBody"></div>
  </div>

  <div id="helpScreen">
    <div class="helpHead">
      <div class="ht">スキル図鑑</div>
      <button class="ghost" onclick="closeHelp()">もどる</button>
    </div>

    </div>
    <div class="helpScroll" id="helpBody"></div>
  </div>
</div>
<div id="hint">指で<b>爆撃君</b>を動かす。撃つのは自動。<b>進化玉</b>で武器がLv30まで成長、<b>必殺</b>ゲージ満タンで必殺技、各地のキモボスを倒せ。</div>

<script>
const APP_VERSION='0.3.0';
const verBadgeEl=document.getElementById('verBadge');
if(verBadgeEl)verBadgeEl.textContent='v'+APP_VERSION;
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const hpEl=document.getElementById('hp'),scoreV=document.getElementById('scoreV'),overlay=document.getElementById('overlay');
const stageTag=document.getElementById('stageTag'),flashEl=document.getElementById('flash'),toastEl=document.getElementById('toast');
const wbar=document.getElementById('wbar'),lvupEl=document.getElementById('lvup');
const spFillEl=document.getElementById('spFill'),spBtnEl=document.getElementById('spBtn');
let W=0,H=0,DPR=1;
function layout(){const wrap=document.getElementById('wrap');
  W=Math.min(window.innerWidth-12,520);H=Math.min(wrap.clientHeight-4,640);if(H<360)H=Math.max(360,window.innerHeight*0.62);
  DPR=window.devicePixelRatio||1;cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);}
window.addEventListener('resize',layout);
</script>

function hexRGB(h){h=h.replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');const n=parseInt(h,16);return ((n>>16)&255)+','+((n>>8)&255)+','+(n&255);}
function hex3(h){h=(h||'#000').replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');const n=parseInt(h,16);return [(n>>16)&255,(n>>8)&255,n&255];}
function mixHex(a,b,t){const pa=hex3(a),pb=hex3(b);return 'rgb('+Math.round(pa[0]+(pb[0]-pa[0])*t)+','+Math.round(pa[1]+(pb[1]-pa[1])*t)+','+Math.round(pa[2]+(pb[2]-pa[2])*t)+')';}
function hsl(a,s,l){return 'hsl('+((a%360+360)%360)+','+s+'%,'+l+'%)';}

  hono:['火の粉','火炎弾','焚き付け','炎の舌','業火放射','燃え盛る怒り','火柱','灼熱の目覚め','ほのちゃん・覚醒','紅蓮の渦','焦熱地獄','灰燼の舞','ほのちゃん・極','不死鳥の翼','業火の慟哭','フェニックスストーム','劫火の支配者','ほのちゃん・大焦熱','灰より蘇る','不死鳥神・降臨','千の業火','全方位インフェルノ','ほのちゃん・終焔','燃え尽きてなお','ほのちゃん・絶対灼熱','灰から世界を創る者','ほのちゃん・超焔','ラスト・フェニックス','ほのちゃん・不死の極','幾度も滅び蘇る悲しみの不死鳥神'],
  valk:['光柱・初陣','聖光の降誕','三連の聖柱','光輪の祝福','天翔の光柱','女神の照覧','聖光連柱','戦乙女の覚醒','ヴァルキリー・覚醒','降臨の大光柱','北欧の祝福','黄金の光柱','ヴァルキリー・極','天を貫く聖柱','選定の光','聖光ストーム','戦場の女神','ヴァルキリー・神威','勇者を導く光','主神・降臨','ヴァルハラの光柱','全方位ホーリー','ヴァルキリー・神々の黄昏','滅びを照らす聖光','ヴァルキリー・絶対聖域','運命を照らす女神','ヴァルキリー・超越','ラスト・ラグナロク','ヴァルキリー・神域の極','世界の終わりを看取る戦乙女神'],
  magni:['重力波・微','磁界の波紋','引力の輪','潮汐の渦','磁嵐の波','重力の囁き','質量の波動','特異点の覚醒','マグニータ・起動','事象の重波','時空の歪み','重力崩波','マグニータ・極','超重力場','崩界の輪','グラビトンストーム','時空の支配者','マグニータ・特異点','銀河を歪める波','重力神・降臨','ブラックホール召喚','全方位グラビティ','マグニータ・超時空崩波','光すら逃さぬ波','マグニータ・絶対重力','宇宙を畳む創造主','マグニータ・超越重力','ラスト・シンギュラリティ','マグニータ・神域の引力','万物を呑み込む特異点神'],
  frey:['裁きの導き','天秤の光','双つの審判','光速の裁き','断罪の照準','神託の囁き','反射する神光','神器の覚醒','フレイ・覚醒','四連審判','運命の分岐','光速の槍','フレイ・極','五行裁断','万象の天秤','神話ストーム','理を司る者','フレイ・神話','創世の煌めき','創造神・降臨','全知の審判','全方位ジャッジ','フレイ・創造と破壊','この一裁きに万象を賭けて','フレイ・絶対神域','世界を裁き創る者','フレイ・超越神','ラスト・ジェネシス','フレイ・全知全能','創造と破壊を司る至高神'],
};
const TIERS=[
  {n:'芽生え',  r:'I',  c:'#9ab8ff'},
  {n:'成長',    r:'II', c:'#6effa0'},
  {n:'開花',    r:'III',c:'#ffd23d'},
  {n:'覚醒',    r:'IV', c:'#ff9f43'},
  {n:'必殺',    r:'V',  c:'#ff5a6a'},
  {n:'極',      r:'VI', c:'#ff8aff'},
];
function tierIdx(lv){return Math.min(5,Math.floor((lv-1)/5));}
const SP_DMG_MUL=[0,1,2.0,3.6];
const SP_INV_MUL=[0,1,1.3,1.7];
</script>
<script>
class Game{
  constructor(){this.best=+(localStorage.getItem('sky-best')||0);this.running=false;
    this.valkUnlocked=localStorage.getItem('valk-unlocked')==='1';
    this.magniUnlocked=localStorage.getItem('magni-unlocked')==='1';
    this.freyUnlocked=localStorage.getItem('frey-unlocked')==='1';
    try{this.records=JSON.parse(localStorage.getItem('bk-records')||'{}');}catch(e){this.records={};}}
  saveRecord(){if(!this.char)return;const id=this.char.id;
    const rec=this.records[id]||{bestStage:0,bestScore:0,clears:0};
    if(this.stage>rec.bestStage)rec.bestStage=this.stage;
    if(this.score>rec.bestScore)rec.bestScore=this.score;
    this.records[id]=rec;
    try{localStorage.setItem('bk-records',JSON.stringify(this.records));}catch(e){}}
  addClear(){if(!this.char)return;const id=this.char.id;
    const rec=this.records[id]||{bestStage:0,bestScore:0,clears:0};
    rec.clears=(rec.clears||0)+1;this.records[id]=rec;
    try{localStorage.setItem('bk-records',JSON.stringify(this.records));}catch(e){}}
  maxReachedStage(){let m=0;for(const id in this.records){const r=this.records[id];if(r&&r.bestStage>m)m=r.bestStage;}return m;}
  /* ===== 解放条件をスコア式に刷新 =====
     ヴァルキリー: 任意の3機がそれぞれ最高2万点以上
     マグニータ : 任意の単機で最高3.5万点以上
     フレイ     : 全機の最高点の合計が25万点以上
     現在プレイ中のスコアも記録とマージして即時判定する */
  scoreStats(){let over20=0,anyOver35=false,total=0;
    const merged={};
    for(const id in this.records){const r=this.records[id];if(r)merged[id]=r.bestScore||0;}
    if(this.char){const id=this.char.id;merged[id]=Math.max(merged[id]||0,this.score||0);}
    for(const id in merged){const s=merged[id];total+=s;if(s>=20000)over20++;if(s>=35000)anyOver35=true;}
    return {over20,anyOver35,total};}
  checkUnlocks(){
    const st=this.scoreStats();
    if(!this.valkUnlocked&&st.over20>=3&&typeof unlockValk==='function'){
      unlockValk(false);this.toast('条件達成! ヴァルキリー解放','#ff8aff');if(typeof SFX!=='undefined'&&SFX.clear)SFX.clear();}
    if(!this.magniUnlocked&&st.anyOver35&&typeof unlockMagni==='function'){
      unlockMagni(false);this.toast('条件達成! マグニーター解放','#8aa8ff');if(typeof SFX!=='undefined'&&SFX.clear)SFX.clear();}
    if(!this.freyUnlocked&&st.total>=250000&&typeof unlockFrey==='function'){
      unlockFrey(false);this.toast('条件達成! フレイ解放','#ffe88a');if(typeof SFX!=='undefined'&&SFX.clear)SFX.clear();}}

  /* テーブル内サブインデックス(=武器パラメータが切り替わる単位)。lvが切り替わるたびに番号が変わる */
  weaponSubIdx(lv){const fam=this.char.fam;
    const full=this.char.divine?ULT[this.char.id]:(this.char.fullTable?FULL[this.char.id]:null);
    if(full)return Math.min(full.length-1,Math.floor((lv-1)/3));
    if(lv<=16)return Math.min(FAM_TIERS[fam].length-1,Math.floor((lv-1)*FAM_TIERS[fam].length/16));
    if(lv<=19)return 100;
    if(lv<=22)return 101;
    return 102;}
  /* このLvで武器テーブルが切り替わるか(=「進化」演出対象Lvか) */
  isEvolveLv(lv){if(lv<=1)return true;return this.weaponSubIdx(lv)!==this.weaponSubIdx(lv-1);}
  /* テーブル切替Lvからの相対位置(0,1,2,...)。ベース名へのローマ数字接尾辞用 */
  weaponSubStep(lv){let step=0;for(let l=lv;l>=1;l--){if(this.isEvolveLv(l))break;step++;}return step;}
  curWeapon(lv){const fam=this.char.fam;lv=lv||this.wlv;let base,phase;
    const full=this.char.divine?ULT[this.char.id]:(this.char.fullTable?FULL[this.char.id]:null);
    if(full){const idx=Math.min(full.length-1,Math.floor((lv-1)/3));base=Object.assign({},full[idx]);phase=this.char.divine?'divine':'full';}
    else if(lv<=16){const fi=Math.min(FAM_TIERS[fam].length-1,Math.floor((lv-1)*FAM_TIERS[fam].length/16));base=Object.assign({},FAM_TIERS[fam][fi]);phase='common';}
    else if(lv<=19){base=Object.assign({},ULT[this.char.id][0]);phase='mid';}
    else if(lv<=22){base=Object.assign({},ULT[this.char.id][1]);phase='mid';}
    else{base=Object.assign({},ULT[this.char.id][2]);phase='ult';}
    const ti=tierIdx(lv);
    const g=1+(lv-1)*0.06+ti*0.15;
    base.dmg=(base.dmg||1)*g;
    base.rate=Math.max(30,(base.rate||150)*(1-(lv-1)*0.014));
    base.n=(base.n||1)+Math.floor((lv-1)/7);
    const nm=WNAMES[this.char.id];
    if(nm&&nm[lv-1])base.name=nm[lv-1];
    else{
      /* テーブル切替で名前更新が無いLvは、ベース名にローマ数字を付与してLv差を可視化 */
      const step=this.weaponSubStep(lv);
      if(step>0){const roman=['','II','III','IV','V'][Math.min(4,step)];if(base.name)base.name=base.name+' '+roman;}
    }
    /* 色進化:
       Lv1-22   武器固有色を維持(キャラ識別)
       Lv23-29  動的レインボーオーラを乗せる(_rainbowLv: Lv23=0.18 → Lv29=0.85)。
                武器色の弾と虹色の弾が混在し、Lvが進むほど虹比率が上がる
       Lv30     完全レインボー(rainbow=true、武器色は捨てる) */
    if(lv>=23&&!base.rainbow){
      base._rainbowLv=Math.min(0.9,0.18+(lv-23)*0.12);/* Lv23=0.18, Lv29=0.9 */
      if(lv>=30){base.rainbow=true;base._rainbowLv=1;}/* Lv30で完全レインボー化 */
    }
    const special=this.char.divine||this.char.valk||this.char.magni||this.char.frey;
    if(!special&&base.beam&&lv<25)base.beam=false;
    base._lv=lv;base._phase=phase;base._tier=ti;
    base._subIdx=this.weaponSubIdx(lv);base._evolves=this.isEvolveLv(lv);
    return base;}
  isUlt(){return this.wlv>=23;}
  isMax(){return this.wlv>=30;}
  orbsNeed(lv){return 3+lv;}

  start(){layout();overlay.classList.add('hide');closeHelp();closeRelease();
    document.getElementById('pauseScreen').classList.add('hide');
    const pb=document.getElementById('pauseBtn');if(pb)pb.classList.add('show');
    audioInit();audioResume();
    if(!this._soundInit){this._soundInit=true;soundOn=true;musicOn=true;const sb=document.getElementById('soundBtn');if(sb)sb.textContent='\u266a \u97f3 ON';}
    this.char=chosenChar;
    const lockedNow=this.char.frey?(!this.freyUnlocked&&!this.cheat):this.char.magni?(!this.magniUnlocked&&!this.cheat):(this.char.valk&&!this.valkUnlocked&&!this.cheat);
    if(lockedNow){this.toast('ロック中のキャラ','#8aa8ff');chosenChar=CHARS[0];this.char=chosenChar;renderCharPick();}
    this.maxhp=this.char.hp;
    this.score=0;scoreV.textContent=0;this.hp=this.char.hp;this.updHP();
    const rad=this.char.style==='debu'?20:this.char.style==='slim'?12:this.char.style==='robo'?17:this.char.style==='valk'?18:16;
    this.me={x:W/2,y:H*0.78,r:rad};this.target={x:W/2,y:H*0.78};
    this.wlv=this.char.startLv||1;
    this.orbsToNext=this.orbsNeed(this.wlv);
    this.orbsHave=0;
    this.powLevel=0;this.rateLevel=0;
    this.optCount=0;this.optTimers=[];this.trail=[];
    this.bullets=[];this.ebullets=[];this.enemies=[];this.drops=[];this.parts=[];this.clouds=[];this.terrain=[];
    this.fireT=0;this.boss=null;this.scroll=0;
    this.stage=0;this.scoreMul=1;this.scoreMulT=0;
    this.tickets=4;this.updTickets();
    this.bossScore=920;this.bossDone=false;this.orbAng=0;this.satCd=0;this.beamCd=0;this.whip=null;this._inv=0;
    this.special=0;this._spRdy=false;this.updSpecial();
    this.shake=0;this.freyShow=null;this.specialFx=null;
    this.spears=null;this.wingSpears=null;this.freySpearPos=null;
    this.ringbladePos=null;this.funnelPos=null;this.orbCount=0;this.allBeamFire=0;this.tstopActive=0;
    this.pillars=null;this.gravRings=null;this.judgeLances=null;
    this._jamUntil=0;this._slowUntil=0;this._weakUntil=0;this._scatterUntil=0;this._recT=0;
    if(this.char.valk||this.cheat){this._inv=0;}
    this.refreshWBar();
    this.updStageTag();this.initBG();startMusic(0,false);
    this.running=true;this.lastT=performance.now();requestAnimationFrame(t=>this.loop(t));}

  updHP(){hpEl.textContent='\u2665'.repeat(Math.max(0,this.hp))+'\u00b7'.repeat(Math.max(0,this.maxhp-this.hp));}
  updStageTag(){stageTag.textContent=(this.stage+1)+' '+STAGES[this.stage].name;}
  updTickets(){const el=document.getElementById('ticket');if(el)el.textContent=(this.tickets>0?'\u25b7'.repeat(this.tickets):'');}
  powMul(){const now=performance.now();const weak=(this._weakUntil>now)?0.4:1;return ((this.char&&this.char.pow)||1)*(1+this.powLevel*0.3)*weak;}
  rateMul(){return 1/(1+this.rateLevel*0.18);}

  gainSpecial(n){this.special=Math.min(300,(this.special||0)+n);this.updSpecial();}
  spCharges(){return Math.min(3,Math.floor((this.special||0)/100));}
  updSpecial(){if(spFillEl)spFillEl.style.width=Math.min(100,(this.special||0)/3)+'%';
    const n=this.spCharges();const rdy=(n>=1)&&this.running;
    if(spBtnEl){spBtnEl.textContent=n>1?('必殺 ×'+n):'必殺';
      spBtnEl.style.boxShadow=n>=3?'0 0 26px #ff8aff, 0 0 12px #fff':n>=2?'0 0 22px #ffd23d':'';}
    if(rdy!==this._spRdy){this._spRdy=rdy;if(spBtnEl)spBtnEl.classList.toggle('ready',rdy);}}
  fireSpecial(){if(!this.running)return;const n=this.spCharges();if(n<1)return;
    this.special-=n*100;this._spRdy=false;
    const sp=SPECIALS[this.char.id]||SPECIALS.kimo;
    const inv=sp.inv*(SP_INV_MUL[n]||1);const mul=SP_DMG_MUL[n]||1;
    const lvMul=1+(this.wlv-1)*0.045;
    this._inv=Math.max(this._inv||0,performance.now()+inv);
    flashEl.animate([{opacity:0},{opacity:Math.min(1,.7+n*0.1)},{opacity:0}],{duration:500+n*120});
    this.shake=Math.max(this.shake||0,14+n*4);
    this.ebullets=[];
    this.specialFx={t:0,dur:inv,col:sp.col,kind:sp.kind,x:this.me.x,y:this.me.y,charge:n,lv:this.wlv};
    if(typeof SFX!=='undefined'&&SFX.specialFire)SFX.specialFire(sp);
    this.runSpecialDamage(sp,mul*lvMul);
    for(let k=0;k<n;k++)setTimeout(()=>{if(game)game.ring2(game.me.x,game.me.y,k%2?'#fff':sp.col);},k*90);
    const pre=n>=3?'真・':'';
    this.toast('必殺! '+pre+sp.name+(n>1?(' ×'+n):''),sp.col);
    this.updSpecial();}
  runSpecialDamage(sp,mul){mul=mul||1;const dmg=sp.dmg*this.powMul()*mul;
    for(let j=this.enemies.length-1;j>=0;j--){const e=this.enemies[j];this.spark(e.x,e.y,sp.col,5);this.dmgE(j,dmg);}
    if(this.boss&&!this.boss.entering)this.dmgB(dmg*1.4);}

  refreshWBar(){const w=this.curWeapon();const fam=this.char.fam;
    const icon=this.isUlt()?'\u2605':FAM_ICON[fam];const ult=this.isUlt();const mx=this.isMax();
    /* \u73fe\u30c6\u30a3\u30a2\u5185\u306e\u9032\u6357\u30925\u30de\u30b9\u3067\u8868\u793a\u3002\u6bceLv\u3067\u78ba\u5b9f\u306b1\u30de\u30b9\u9032\u3080\u3002 */
    const ti=tierIdx(this.wlv);const inTierLv=this.wlv-ti*5;/* 1\u301c5 */
    const filled=Math.max(1,Math.min(5,inTierLv));
    let segs='';for(let i=1;i<=5;i++){let cls='seg';if(i<=filled)cls+=(mx?' max':' on');segs+='<div class="'+cls+'"></div>';}
    let badges='';
    if(this.powLevel>0)badges+='<span class="pw">火'+this.powLevel+'</span>';
    if(this.rateLevel>0)badges+='<span class="sp">速'+this.rateLevel+'</span>';
    if(this.optCount>0)badges+='<span class="op">分'+this.optCount+'</span>';
    wbar.innerHTML=
      '<div class="wslot'+(ult?' valk':'')+'" style="color:'+w.col+';border-color:'+(mx?'#ff8aff':w.col)+'">'+(mx?'\u2728':icon)+'</div>'+
      '<div class="wlv"><span class="lvnum" style="color:'+(mx?'#ff8aff':w.col)+'">Lv'+this.wlv+'<span style="font-size:9px;color:#5a6a7a">/30</span></span>'+
        '<span style="font-size:10px;color:#7a90b0">'+FAM_LABEL[fam]+' <span style="color:'+TIERS[tierIdx(this.wlv)].c+'">'+TIERS[tierIdx(this.wlv)].r+'</span></span>'+
        '<div class="lvbar">'+segs+'</div></div>'+
      '<div class="badge">'+badges+'</div>';}

  updateTrail(){this.trail.push({x:this.me.x,y:this.me.y});if(this.trail.length>40)this.trail.shift();}
  bodies(){const arr=[{x:this.me.x,y:this.me.y}];const GAP=7;
    for(let i=0;i<this.optCount;i++){const idx=(i+1)*GAP;const p=this.trail[this.trail.length-1-idx];
      arr.push(p?{x:p.x,y:p.y}:{x:this.me.x,y:this.me.y});}
    return arr;}
  toast(t,c){toastEl.textContent=t;toastEl.style.color=c||'#ffd23d';toastEl.classList.remove('show');void toastEl.offsetWidth;toastEl.classList.add('show');}

  levelUp(){if(this.wlv>=30){this.orbsHave=0;return;}
    const prevTier=tierIdx(this.wlv);
    this.wlv++;this.orbsHave=0;this.orbsToNext=this.orbsNeed(this.wlv);
    const w=this.curWeapon();const ult=this.isUlt();const mx=this.isMax();
    const tIdx=tierIdx(this.wlv);const tier=TIERS[tIdx];const tierUp=tIdx>prevTier;
    /* \u6b66\u5668\u30c6\u30fc\u30d6\u30eb\u304c\u5207\u308a\u66ff\u308f\u3063\u305fLv = \u300c\u9032\u5316\u300d(\u6319\u52d5\u304c\u5909\u308f\u308b\u672c\u683c\u7684\u306a\u5909\u5316)\u3002tierUp\u306f\u3053\u308c\u3092\u5185\u5305\u3059\u308b */
    const evolve=!!w._evolves;
    document.getElementById('lvupT').textContent=mx?'\u2605 MAX \u2728\u8679\u8f1d\u2728 \u2605':tierUp?('\u2605 '+tier.n+'\u968e\u5c64 '+tier.r+' \u2605'):evolve?'\u2728 \u6b66\u5668\u9032\u5316 \u2728':'LEVEL UP';
    document.getElementById('lvupT').style.color=mx?'#ff8aff':tierUp?tier.c:evolve?w.col:'#fff';
    document.getElementById('lvupN').textContent='Lv.'+this.wlv+'  '+w.name;
    lvupEl.classList.remove('show');void lvupEl.offsetWidth;lvupEl.classList.add('show');
    /* フラッシュ強度: MAX>ティア>進化>通常 */
    const flashOp=mx?.95:tierUp?.6:evolve?.45:.3;
    const flashDur=mx?800:tierUp?550:evolve?420:280;
    flashEl.animate([{opacity:0},{opacity:flashOp},{opacity:0}],{duration:flashDur});
    const partN=mx?34:tierUp?34:evolve?24:14;
    this.spark(this.me.x,this.me.y,w.col,partN);this.ring2(this.me.x,this.me.y,w.col);
    if(tierUp||evolve)this.ring2(this.me.x,this.me.y,tier.c);

  spawnBoss(){this.bossDone=true;const st=STAGES[this.stage];const cfg=BOSSES[st.boss];

  bossPhase(b){b.phase++;b.iframe=performance.now()+800;

    const n=18;for(let k=0;k<n;k++){const a=k/n*Math.PI*2;this.ebullets.push({x:b.x,y:b.y,vx:Math.cos(a)*0.24,vy:Math.sin(a)*0.24});}

  patternShots(id){return [3,6,4,24,3,30,8,12,4,3][id]||4;}
  loop(t){if(!this.running)return;const dt=Math.min(40,t-this.lastT);this.lastT=t;
    try{this.update(dt);this.draw();}catch(e){}
    requestAnimationFrame(tt=>this.loop(tt));}
  update(dt){const me=this.me;const now=performance.now();
    if(this.shake>0)this.shake=Math.max(0,this.shake-dt*0.06);
    if(this.specialFx){this.specialFx.t+=dt;if(this.specialFx.t>this.specialFx.dur)this.specialFx=null;}
    /* 走行中の解放判定(1秒ごと) */
    this._recT=(this._recT||0)-dt;if(this._recT<=0){this._recT=1000;this.saveRecord();this.checkUnlocks();}
    if(this.slowT&&this.slowT>now){const prog=(this.slowT-now)/2200;dt*=(0.12+prog*0.18);}else this.slowT=0;
    this.scroll+=dt*0.12;
    if(this.scoreMulT&&now>this.scoreMulT){this.scoreMul=1;this.scoreMulT=0;}
    if(this.optTimers.length){let lost=false;while(this.optTimers.length&&now>this.optTimers[0]){this.optTimers.shift();lost=true;}
      if(lost){this.optCount=this.optTimers.length;this.spark(this.me.x,this.me.y,'#6effe0',8);this.refreshWBar();}}
    const fever=this.wlv+this.powLevel+this.optCount;
    if(fever>=14){this.feverCd=(this.feverCd||0)-dt;if(this.feverCd<=0){const it=Math.min(1,(fever-13)/16);this.feverCd=300-it*230;SFX.heatPing();}}
    else{this.feverCd=0;}
    let spd=(this.char&&this.char.spd)||1;
    if(this._slowUntil>now)spd*=0.45;
    me.x+=(this.target.x-me.x)*0.16*spd;me.y+=(this.target.y-me.y)*0.16*spd;
    me.x=Math.max(me.r,Math.min(W-me.r,me.x));me.y=Math.max(me.r,Math.min(H-me.r,me.y));
    for(const c of this.clouds){c.y+=(c.sp+0.06)*dt;if(c.y>H+40){c.y=-40;c.x=Math.random()*W;}}
    if(this.stars)for(const s of this.stars){s.y+=s.z*0.16*dt;if(s.y>H){s.y=-2;s.x=Math.random()*W;}}
    const st=STAGES[this.stage];for(const t2 of this.terrain){t2.y+=(st.space?0.16:0.11)*dt;t2.tw+=0.02;
      if(t2.y>H+60){t2.y=-60;t2.x=Math.random()*W;t2.type=st.terra[Math.floor(Math.random()*st.terra.length)];t2.sz=28+Math.random()*40;t2.hue=Math.random()*360;}}
    this.updateTrail();const bodies=this.bodies();const w=this.curWeapon();
    const jammed=this._jamUntil>now;
    if(w.beam)this.runBeam(dt,bodies,w);
    this.updateOrbiters(dt,w);
    if(w.pull)this.runMagnet(dt,w);
    if(w.gravwave&&!jammed)this.runGravWave(dt,w);
    if(w.pillar&&!jammed)this.runValkPillars(dt,w);
    if(w.judge&&!jammed)this.runFreyJudge(dt,w);
    if(w.ringblade)this.runRingblade(dt,w);
    if(w.funnel)this.runFunnel(dt,w);
    if(w.allbeam){this.runAllBeam(dt,w);this.applyAllBeam(w);}
    if(w.spears){this.runFreySpears(dt,w);}
    this.fireT-=dt;
    if(this.fireT<=0){const rate=(w.rate||150)*this.rateMul();this.fireT=rate;
      if(jammed){}
      else if(w.spears||w.pillar||w.gravwave||w.judge){}
      else if(w.whip)this.lashWhip(w);else this.fireWeapon(w,bodies);}
    this.updateWhip(dt);
    for(let i=this.bullets.length-1;i>=0;i--){const b=this.bullets[i];const age=now-b.born;
      if(b.homing){let tgt=this.nearestEnemy(b.x,b.y);
        if(tgt){const da=Math.atan2(tgt.y-b.y,tgt.x-b.x);const ca=Math.atan2(b.vy,b.vx);
          let na=ca+Math.max(-0.1,Math.min(0.1,((da-ca+Math.PI*3)%(Math.PI*2))-Math.PI));
          const sp=Math.hypot(b.vx,b.vy);b.vx=Math.cos(na)*sp;b.vy=Math.sin(na)*sp;}}
      if(b.wave)b.x+=Math.sin(age*0.02)*1.2;
      if(b.wobble)b.x+=Math.sin(age*0.03)*2.2;
      b.x+=b.vx*dt;b.y+=b.vy*dt;
      if(b.flame&&age>b.life2){this.bullets.splice(i,1);continue;}
      if(!(b.y<-30||b.y>H+40||b.x<-30||b.x>W+30)){}else this.bullets.splice(i,1);}
    const diff=st.diff||1;
    const magniHard=(this.char&&this.char.id==='magni'&&this.stage>=7);
    const gapMul=magniHard?0.6:1;
    const capAdd=magniHard?(this.stage-6)*2:0;
    this.spawnT=(this.spawnT||0)+dt;const gap=Math.max(330,(1300-this.score*2)/diff)*gapMul;
    const cap=3+this.stage+Math.floor(this.score/120)+capAdd;
    if(!this.boss&&this.spawnT>gap&&this.enemies.length<cap){this.spawnT=0;this.spawnEnemy();}
    if(this.score>=this.bossScore&&!this.boss&&!this.bossDone){this.spawnBoss();}
    const edif=diff;
    for(let i=this.enemies.length-1;i>=0;i--){const e=this.enemies[i];
      e.sway+=0.06;e.wig+=0.12;
      const frozen=this.tstopActive>0;
      const k=e.spd*dt*(0.8+edif*0.25);
      if(!frozen){
        e.x+=(e.dx||0)*k;e.y+=(e.dy==null?1:e.dy)*k;
        if(Math.abs(e.dx||0)>0.5)e.y+=Math.sin(e.sway)*e.swayAmp;else e.x+=Math.sin(e.sway)*e.swayAmp;}
      if(e.dir==='top'||e.dir==='bottom'||!e.dir)e.x=Math.max(10,Math.min(W-10,e.x));
      if(!e.entered&&e.x>-5&&e.x<W+5&&e.y>-5&&e.y<H+5)e.entered=true;
      if(e.fire){e.fireT-=dt;if(e.fireT<=0&&e.y>0&&e.y<H*0.85){e.fireT=1500/edif;SFX.enemyShot();
        const bs=0.2+edif*0.03;
        if(e.aim){const dx=me.x-e.x,dy=me.y-e.y,d=Math.hypot(dx,dy)||1;this.ebullets.push({x:e.x,y:e.y,vx:dx/d*bs,vy:dy/d*bs});}
        else this.ebullets.push({x:e.x,y:e.y,vx:0,vy:bs});}}
      if(e.entered&&(e.y>H+50||e.y<-50||e.x<-50||e.x>W+50)){this.enemies.splice(i,1);continue;}
      if(!e.entered&&now-e.born>9000){this.enemies.splice(i,1);continue;}
      if((e.x-me.x)**2+(e.y-me.y)**2<(e.r+me.r)**2){this.hit();e.y+=40;}}
    if(this.boss)this.updateBoss(dt,now);
    for(let i=this.ebullets.length-1;i>=0;i--){const b=this.ebullets[i];if(!(this.tstopActive>0)){b.x+=b.vx*dt;b.y+=b.vy*dt;}
      if(b.y<-20||b.y>H+20||b.x<-20||b.x>W+20){this.ebullets.splice(i,1);continue;}
      const hr=me.r*0.7*((this.char&&this.char.hit)||1);if((b.x-me.x)**2+(b.y-me.y)**2<(hr+5)**2){this.ebullets.splice(i,1);this.hit();}}
    this.collide();
    for(let i=this.drops.length-1;i>=0;i--){const d=this.drops[i];
      if(d.vx){d.x+=d.vx*dt;d.vx*=0.94;}if(d.vy){d.y+=d.vy*dt;d.vy*=0.94;}
      d.y+=0.06*dt;d.bob+=0.12;
      if(d.y>H+30){this.drops.splice(i,1);continue;}
      if((d.x-me.x)**2+(d.y-me.y)**2<(me.r+14)**2){this.drops.splice(i,1);this.take(d);}}
    for(let i=this.parts.length-1;i>=0;i--){const p=this.parts[i];
      if(p.ring){p.r+=p.grow*dt;p.life-=dt;if(p.life<=0)this.parts.splice(i,1);continue;}
      p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.96;p.vy*=0.96;p.life-=dt;if(p.life<=0)this.parts.splice(i,1);}}

  fireWeapon(w,bodies){SFX.fire(w,this.char.fam);const powMul=this.powMul();const muz=this.me.r*0.6;
    const lvr=1+(this.wlv-1)*0.026;const now=performance.now();const scatter=this._scatterUntil>now;
    for(const bd of bodies){const sx=bd.x,sy=bd.y-muz;
      const extra=(this.char&&this.char.extra||0)+(w.extra||0);const nn=(w.n||1)+extra;
      for(let k=0;k<nn;k++){
        let off=(k-(nn-1)/2);let ang=-Math.PI/2+off*(w.spread||0.12);
        if(scatter)ang+=(Math.random()-0.5)*1.7;
        const spd=w.laser?1.4:w.flame?0.5:w.wave?0.7:0.85;
        let col=w.col;
        if(w.rainbow)col='hsl('+((performance.now()*0.4+k*40)%360)+',90%,65%)';
        else if(w._rainbowLv){
          /* Lv23+でレインボー弾を混ぜる。弾の k インデックス + 時間で位相を決め、
             _rainbowLv 比率の弾が確実にレインボーになる。Lvが上がるほど混入比率が増す。 */
          const slot=(k+Math.floor(now*0.012))%Math.max(2,Math.ceil(1/w._rainbowLv));
          if(slot===0)col='hsl('+((now*0.5+k*55+off*30)%360)+',95%,62%)';
        }
        this.bullets.push({x:sx+(nn>1?off*5:0),y:sy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
          dmg:(w.dmg||1)*powMul,col,r:(w.big?7:w.laser?3:w.flame?6:4)*lvr,laser:w.laser,
          llen:w.laser?(7+Math.min(20,(this.wlv-1)*0.9)):0,
          homing:w.homing,wave:w.wave,pierce:w.pierce,chain:w.chain,flame:w.flame,nova:w.nova,
          wobble:w.wob||((this.char&&this.char.wob)?true:false),
          born:performance.now(),life2:w.flame?(260+Math.min(340,(this.wlv-1)*14)):9999,hits:[]});}}}

  /* ===== ヴァルキリー専用: 天から降る聖なる光柱 ===== */
  runValkPillars(dt,w){const n=w.pillar||1;this.pillarCd=(this.pillarCd||0)-dt;
    if(!this.pillars)this.pillars=[];
    if(this.pillarCd<=0){this.pillarCd=(w.rate||400)*this.rateMul();
      const tg=this.pickNearest(n);
      for(let i=0;i<n;i++){let px,py;
        if(tg[i]){px=tg[i].x;py=tg[i].y;}else{px=40+Math.random()*(W-80);py=H*0.3*Math.random();}
        this.pillars.push({x:px,t:0,tel:180,str:420,col:w.col,col2:w.col2||'#fff0a0',dmg:(w.dmg||3)*this.powMul(),hits:[]});}

  dmgB(dmg){const b=this.boss;if(!b)return;if(b.entering)return;if(b.iframe>performance.now())return;b.hp-=dmg;SFX.bossHit();
    if(b.phase<2&&b.hp/b.maxhp<=(b.phase===0?0.66:0.33))this.bossPhase(b);
    if(b.hp<=0){
      const bx=b.x,by=b.y;
      this.score+=250;scoreV.textContent=this.score;this.gainSpecial(40);
      this.bossLoot(bx,by);
      this.slowT=performance.now()+2200;
      this.boss=null;this.bossDefeat={x:bx,y:by,t:0};
      this.ebullets=[];
      SFX.bossHit();SFX.explode(true);
      flashEl.animate([{opacity:0},{opacity:.7},{opacity:0}],{duration:700});
      this.spark(bx,by,'#fff',30);this.ring2(bx,by,'#fff');this.shake=Math.max(this.shake||0,18);
      for(let i=0;i<15;i++){const dl=100+i*110;setTimeout(()=>{if(!game)return;
        const ex=bx+(Math.random()-0.5)*120,ey=by+(Math.random()-0.5)*120;
        const big=i%3===0;
        game.spark(ex,ey,'#ffd23d',big?22:14);game.spark(ex,ey,'#ff3d6e',big?16:10);game.ring2(ex,ey,big?'#fff':'#ffd23d');
        flashEl.animate([{opacity:0},{opacity:big?.5:.3},{opacity:0}],{duration:big?280:180});
        if(typeof SFX!=='undefined')SFX.explode(big);},dl);}
      setTimeout(()=>{if(!game)return;flashEl.animate([{opacity:0},{opacity:.9},{opacity:0}],{duration:600});
        if(typeof SFX!=='undefined'){SFX.explode(true);SFX.clear();}
        for(let k=0;k<5;k++)game.ring2(bx,by,k%2?'#ffd23d':'#fff');},1750);
      setTimeout(()=>{if(game)game.stageClear();},2050);
    }}
  dropAt(x,y,kind,vx,vy){let k;
    if(kind==='gacha')k={gacha:true,kind:DROPS[Math.floor(Math.random()*DROPS.length)]};
    else if(kind==='gachagood')k={gacha:true,kind:GOOD_DROPS[Math.floor(Math.random()*GOOD_DROPS.length)]};
    else if(kind==='orb')k={orb:true};
    else k={kind:kind};
    this.drops.push(Object.assign({x,y,bob:Math.random()*7,vx:vx||0,vy:vy||0},k));}
  bossLoot(bx,by){const give=['gachagood','gachagood','gachagood','orb','orb','orb','orb','powerup','rateup','option','heal','fullheal'];
    for(let i=0;i<give.length;i++){const a=i/give.length*Math.PI*2+Math.random()*0.3;const sp=0.12+Math.random()*0.13;
      this.dropAt(bx+Math.cos(a)*20,by+Math.sin(a)*20,give[i],Math.cos(a)*sp,Math.sin(a)*sp-0.05);}}

  /* ===== アイテム取得。ハズレ(罠)は強烈で痛い ===== */
  take(d){
    if(d.orb){
      this.orbsHave++;SFX.orb();this.spark(this.me.x,this.me.y-this.me.r,this.curWeapon().col,5);
      if(this.orbsHave>=this.orbsToNext)this.levelUp();else this.refreshWBar();return;}
    const kind=d.kind;const now=performance.now();
    if(kind==='heal'){flashEl.animate([{opacity:0},{opacity:.3},{opacity:0}],{duration:200});this.hp=Math.min(this.maxhp,this.hp+1);this.updHP();SFX.heal();this.toast('回復+1','#6eff7a');return;}
    if(kind==='fullheal'){flashEl.animate([{opacity:0},{opacity:.3},{opacity:0}],{duration:200});this.hp=this.maxhp;this.updHP();SFX.heal();this.toast('全回復','#6eff7a');return;}
    if(kind==='shield'){flashEl.animate([{opacity:0},{opacity:.3},{opacity:0}],{duration:200});this._inv=performance.now()+5000;SFX.good();this.toast('5秒無敵','#6effe0');return;}
    if(kind==='double'){flashEl.animate([{opacity:0},{opacity:.3},{opacity:0}],{duration:200});this.scoreMul=2;this.scoreMulT=performance.now()+8000;SFX.good();this.toast('スコア×2','#ffd23d');return;}
    if(kind==='powerup'){flashEl.animate([{opacity:0},{opacity:.3},{opacity:0}],{duration:200});if(this.powLevel<5){this.powLevel++;SFX.powerEsc(this.powLevel);}this.toast('火力UP '+this.powLevel,'#ff9f43');this.refreshWBar();return;}
    if(kind==='rateup'){flashEl.animate([{opacity:0},{opacity:.3},{opacity:0}],{duration:200});if(this.rateLevel<5){this.rateLevel++;SFX.powerEsc(this.rateLevel);}this.toast('射出スピードUP '+this.rateLevel,'#ff5fa2');this.refreshWBar();return;}
    if(kind==='option'){flashEl.animate([{opacity:0},{opacity:.3},{opacity:0}],{duration:200});if(this.optCount<3){this.optTimers.push(performance.now()+18000);this.optCount=this.optTimers.length;SFX.option();this.toast('分身機 ×'+this.optCount,'#6effe0');}else{this.optTimers[this.optTimers.length-1]=performance.now()+18000;SFX.option();}this.refreshWBar();return;}
    /* ハズレ(罠): 効果を強烈にして明確に痛くする */
    if(kind==='jam'){this._jamUntil=now+2600;this.trapHit('ハズレ! 武器ジャム 2.6秒撃てない','#ff4d6a');return;}
    if(kind==='slow'){this._slowUntil=now+5000;this.trapHit('ハズレ! 鈍足 5秒','#ff4d6a');return;}
    if(kind==='weaken'){this._weakUntil=now+6000;this.trapHit('ハズレ! 火力激減 6秒','#ff4d6a');this.refreshWBar();return;}
    if(kind==='scatter'){this._scatterUntil=now+4000;this.trapHit('ハズレ! 照準崩壊 4秒','#ff4d6a');return;}
    if(kind==='damage'){this.trapHit('ハズレ! 直撃ダメージ','#ff2a4a');this.hit(true);return;}}

  /* 罠の痛みを画面で明確に伝える: 赤フラッシュ + 振動 + 赤火花 + 専用音 */
  trapHit(msg,col){flashEl.style.background='#ff2a4a';
    flashEl.animate([{opacity:0},{opacity:.6},{opacity:.2},{opacity:.5},{opacity:0}],{duration:600})
      .onfinish=()=>{flashEl.style.background='#fff';};
    this.shake=Math.max(this.shake||0,13);
    for(let k=0;k<14;k++){const a=Math.random()*7,s=0.2+Math.random()*0.5;
      this.parts.push({x:this.me.x,y:this.me.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:2+Math.random()*3,col:'#ff3a4a',life:400});}
    this.ring2(this.me.x,this.me.y,'#ff2a4a');
    if(typeof SFX!=='undefined'&&SFX.trap)SFX.trap();
    this.toast(msg,col||'#ff4d6a');}

  hit(force){if(this.cheat&&!force)return;if(!force&&this._inv>performance.now())return;
    if(!force&&this.char&&this.char.armor&&Math.random()<this.char.armor){this.spark(this.me.x,this.me.y,'#cfe8ff',6);this._inv=performance.now()+300;return;}
    this._inv=performance.now()+900;this.hp--;this.updHP();SFX.playerHit();
    if(this.optTimers.length){this.optTimers.pop();this.optCount=this.optTimers.length;this.spark(this.me.x,this.me.y,'#6effe0',10);this.refreshWBar();}
    this.spark(this.me.x,this.me.y,'#ff4d6a',12);if(this.hp<=0)this.downed();}

  downed(){
    if(typeof this.tickets!=='number'||isNaN(this.tickets))this.tickets=0;
    if(this.tickets>0){
      const wasLast=(this.tickets===1);
      this.tickets--;this.updTickets();
      this.running=false;stopMusic();if(spBtnEl)spBtnEl.classList.remove('ready');this._spRdy=false;
      this.ebullets=[];this.optTimers=[];this.optCount=0;this.refreshWBar();
      this.spark(this.me.x,this.me.y,'#ff4d6a',30);
      flashEl.animate([{opacity:0},{opacity:.85},{opacity:0}],{duration:550});
      SFX.playerHit();
      this.draw();
      const sc=document.getElementById('reviveScreen');
      const remainTxt=wasLast?'<span style="color:#ff9f43">これが最後のチケット</span>':'復帰後の残りチケット <b class="g">'+this.tickets+'</b> 枚';
      document.getElementById('reviveInfo').innerHTML=remainTxt+'<br>スコア '+this.score+'　武器 Lv'+this.wlv;
      document.querySelector('#reviveScreen .go').textContent=wasLast?'ラストチケットで復帰':'戦線復帰';
      if(sc)sc.classList.remove('hide');
    }else this.over();}
  reviveGo(){
    const sc=document.getElementById('reviveScreen');if(sc)sc.classList.add('hide');
    this.hp=this.maxhp;this.updHP();
    this._inv=performance.now()+2800;
    this.spark(this.me.x,this.me.y,'#8affff',28);this.ring2(this.me.x,this.me.y,'#8affff');
    flashEl.animate([{opacity:0},{opacity:.6},{opacity:0}],{duration:450});
    SFX.revive();this.toast('戦線復帰!','#8affff');
    audioInit();audioResume();startMusic(this.stage,!!this.boss);
    this.running=true;this.lastT=performance.now();
    requestAnimationFrame(t=>this.loop(t));}

  spark(x,y,col,n){for(let i=0;i<n;i++){const a=Math.random()*7,s=0.1+Math.random()*0.45;
    this.parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:2+Math.random()*3,col,life:300+Math.random()*300});}}
  ring2(x,y,col){this.parts.push({ring:true,x,y,r:4,col,life:260,grow:0.18});}
  nearestEnemy(x,y){let best=null,bd=1e9;for(const e of this.enemies){const d=(e.x-x)**2+(e.y-y)**2;if(d<bd){bd=d;best=e;}}if(this.boss&&!this.boss.entering){const d=(this.boss.x-x)**2+(this.boss.y-y)**2;if(d<bd)best=this.boss;}return best;}

  updateBoss(dt,now){const b=this.boss;b.t+=dt;const diff=STAGES[this.stage].diff||1;
    if(b.entering){b.y+=0.045*dt;if(b.y>=b.targetY){b.y=b.targetY;b.entering=false;this.toast(b.cfg.name+' 出現!','#ff3d6e');}}
    else{b.x=W/2+Math.sin(b.t*0.0008)*(W*0.32);
      if(b.iframe<=now){b.fireT-=dt*(1+b.phase*0.4);
        if(b.fireT<=0){const id=b.pool[b.pi];this.bossFire(b,id,diff*(1+b.phase*0.25));SFX.enemyShot();
          b.shotsLeft--;if(b.shotsLeft<=0){b.pi=(b.pi+1)%b.pool.length;b.shotsLeft=this.patternShots(b.pool[b.pi]);}}}}
    if(!b.entering&&(b.x-this.me.x)**2+(b.y-this.me.y)**2<(b.r+this.me.r)**2)this.hit();}
  bossFire(b,id,diff){const me=this.me;const spd=0.2*Math.min(1.8,1+(diff-1)*0.35);
    const shoot=(a,sp)=>this.ebullets.push({x:b.x,y:b.y+(a>0?b.r:0),vx:Math.cos(a)*(sp||spd),vy:Math.sin(a)*(sp||spd)});
    if(id===0){b.fireT=600/diff;const n=7+Math.floor(this.score/400)+this.stage;
      for(let k=0;k<n;k++){const a=Math.PI/2+(k-(n-1)/2)*0.24;shoot(a);}}
    else if(id===1){b.fireT=200;const dx=me.x-b.x,dy=me.y-b.y;
      for(let k=-1;k<=1;k++){const a=Math.atan2(dy,dx)+k*0.15;shoot(a,spd*1.3);}}
    else if(id===2){b.fireT=520/diff;const n=12+Math.floor(diff*3);b.spin+=0.3;
      for(let k=0;k<n;k++){const a=k/n*Math.PI*2+b.spin;this.ebullets.push({x:b.x,y:b.y,vx:Math.cos(a)*spd*0.85,vy:Math.sin(a)*spd*0.85});}}
    else if(id===3){b.fireT=70;b.spiral+=0.4;
      for(let s=0;s<2+Math.floor(this.stage/4);s++){const a=b.spiral+s*Math.PI*2/(2+Math.floor(this.stage/4));this.ebullets.push({x:b.x,y:b.y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd});}}
    else if(id===4){b.fireT=680/diff;const cols=10;const gap=1+Math.floor(Math.random()*(cols-2));
      for(let k=0;k<cols;k++){if(k===gap||k===gap+1)continue;const x=20+k*((W-40)/(cols-1));this.ebullets.push({x,y:b.y,vx:0,vy:spd*0.9});}}
    else if(id===5){b.fireT=85;b.spiral+=0.55;const arms=4+Math.floor(this.stage/3);
      for(let s=0;s<arms;s++){const a=b.spiral+s*Math.PI*2/arms;this.ebullets.push({x:b.x,y:b.y,vx:Math.cos(a)*spd*0.95,vy:Math.sin(a)*spd*0.95});}}
    else if(id===6){b.fireT=150;const dx=me.x-b.x,dy=me.y-b.y;
      for(let k=-2;k<=2;k++){const a=Math.atan2(dy,dx)+k*0.12;shoot(a,spd*1.5);}}
    else if(id===7){b.fireT=110;for(let k=0;k<3;k++){const x=Math.random()*W;this.ebullets.push({x,y:-10,vx:(Math.random()-0.5)*0.05,vy:spd*0.8});}}
    else if(id===8){b.fireT=520/diff;const base=Math.atan2(me.y-b.y,me.x-b.x);
      for(let k=0;k<8;k++){const a=k/8*Math.PI*2+base;this.ebullets.push({x:b.x,y:b.y,vx:Math.cos(a)*spd*1.1,vy:Math.sin(a)*spd*1.1,big:true});}}
    else if(id===9){b.fireT=900/diff;const n=16+Math.floor(diff*2);b.spin+=0.2;
      for(let ring=0;ring<2;ring++){const sp=spd*(ring?0.7:1.05);
        for(let k=0;k<n;k++){const a=k/n*Math.PI*2+b.spin+ring*0.2;this.ebullets.push({x:b.x,y:b.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp});}}}}

  stageClear(){this.running=false;stopMusic();SFX.clear();if(spBtnEl)spBtnEl.classList.remove('ready');this._spRdy=false;
    flashEl.animate([{opacity:0},{opacity:.7},{opacity:0}],{duration:600});
    const st=STAGES[this.stage];const last=this.stage>=STAGES.length-1;
    this.saveRecord();if(last)this.addClear();
    this.checkUnlocks();
    let lotMsg='';const roll=Math.random();
    if(roll<0.35&&this.tickets<5){this.tickets=Math.min(5,this.tickets+1);this.updTickets();lotMsg='<br><span style="color:#8affff">抽選あたり! 出撃チケット +1 (所持'+this.tickets+')</span>';SFX.good();}
    else if(roll<0.35){lotMsg='<br><span style="color:#8affff">抽選あたり! ただしチケットは満タン(5)</span>';SFX.good();}
    document.getElementById('clearTitle').textContent=last?'全ステージ制覇!!':st.name+' クリア!';
    document.getElementById('clearInfo').innerHTML='スコア <b class="g">'+this.score+'</b>　武器 <b class="g">Lv'+this.wlv+'</b>'+
      (last?'<br>君は'+STAGES.length+'の世界を駆け抜けた。最高の爆撃君だ。':'<br>次は「'+STAGES[this.stage+1].name+'」')+lotMsg;
    document.querySelector('#clearScreen .go').textContent=last?'最初から':'次のステージへ';
    document.getElementById('clearScreen').classList.remove('hide');this._lastClear=last;}
  nextStage(){document.getElementById('clearScreen').classList.add('hide');
    if(this._lastClear){this.stage=0;this.score=0;scoreV.textContent=0;
      this.wlv=this.char.startLv||1;this.orbsHave=0;this.orbsToNext=this.orbsNeed(this.wlv);
      this.powLevel=0;this.rateLevel=0;this.optCount=0;this.optTimers=[];this.special=0;this.updSpecial();this.refreshWBar();}
    else this.stage++;
    this.saveRecord();
    this.checkUnlocks();
    this.updStageTag();this.bossScore=this.score+900+this.stage*80;this.bossDone=false;
    this.enemies=[];this.ebullets=[];this.drops=[];this.bullets=[];this.spears=null;this.wingSpears=null;
    this.pillars=null;this.gravRings=null;this.judgeLances=null;
    this.tickets=Math.min(5,Math.max(this.tickets,1));this.updTickets();
    this.hp=Math.min(this.maxhp,this.hp+1);this.updHP();this.initBG();startMusic(this.stage,false);
    this.running=true;this.lastT=performance.now();requestAnimationFrame(t=>this.loop(t));}
  isAnyOverlayOpen(){
    const ids=['overlay','clearScreen','reviveScreen','pauseScreen'];
    for(const id of ids){const el=document.getElementById(id);if(el&&!el.classList.contains('hide'))return true;}
    const help=document.getElementById('helpScreen');
    if(help&&help.classList.contains('show'))return true;
    return false;}
  pauseGame(){
    if(!this.running)return;
    const ps=document.getElementById('pauseScreen');
    if(!ps||!ps.classList.contains('hide'))return;
    if(this.isAnyOverlayOpen())return;
    this.running=false;stopMusic();
    if(spBtnEl)spBtnEl.classList.remove('ready');this._spRdy=false;
    ps.classList.remove('hide');}
  resumeGame(){
    const ps=document.getElementById('pauseScreen');if(ps)ps.classList.add('hide');
    if(this.running)return;
    audioInit();audioResume();startMusic(this.stage,!!this.boss);
    this.running=true;this.lastT=performance.now();
    requestAnimationFrame(t=>this.loop(t));}
  toTitle(){
    this.running=false;stopMusic();
    this.saveRecord();this.checkUnlocks();
    if(this.score>this.best){this.best=this.score;localStorage.setItem('sky-best',this.best);}
    if(spBtnEl){spBtnEl.classList.remove('ready');spBtnEl.style.boxShadow='';}
    this._spRdy=false;
    if(spFillEl)spFillEl.style.width='0%';
    stageTag.textContent='1 ネオン街';
    hpEl.innerHTML='&#9829;&#9829;&#9829;';
    scoreV.textContent='0';
    const tk=document.getElementById('ticket');if(tk)tk.textContent='';
    wbar.innerHTML='';
    const pb=document.getElementById('pauseBtn');if(pb)pb.classList.remove('show');
    document.getElementById('pauseScreen').classList.add('hide');
    document.getElementById('clearScreen').classList.add('hide');
    document.getElementById('reviveScreen').classList.add('hide');
    document.querySelector('#overlay .big').textContent='爆撃君';
    document.querySelector('#overlay .sub').innerHTML='指で動かす。撃つのは自動。<br><b class="g">進化玉</b>で武器がLv30まで進化(毎レベル名前が変わる)。<br>撃破で<b class="g">必殺ゲージ</b>が溜まる。最大3本まで溜めて撃つほど大技に。<br>各地のキモボスを倒せ。';
    document.querySelector('#overlay .go').textContent='発進';
    overlay.classList.remove('hide');}
  over(){this.running=false;stopMusic();this.saveRecord();if(spBtnEl)spBtnEl.classList.remove('ready');this._spRdy=false;
    this.checkUnlocks();
    if(this.score>this.best){this.best=this.score;localStorage.setItem('sky-best',this.best);}
    const pb=document.getElementById('pauseBtn');if(pb)pb.classList.remove('show');
    document.querySelector('#overlay .big').textContent='全機撃墜';
    document.querySelector('#overlay .sub').innerHTML='出撃チケットも尽きた<br>ステージ '+(this.stage+1)+' / スコア <b class="g">'+this.score+'</b>　最高 '+this.best;
    document.querySelector('#overlay .go').textContent='再発進';overlay.classList.remove('hide');}
}
const game=new Game();
</script>
<script>
const FAM_ICON={rapid:'⁞',heavy:'◆',spread:'❉',homing:'◉',special:'∿',magnet:'⊛',divine:'✦'};

Game.prototype.draw=function(){
  const st=STAGES[this.stage];
  ctx.save();
  if(this.shake>0){const s=this.shake;ctx.translate((Math.random()-0.5)*s,(Math.random()-0.5)*s);}
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,st.sky[0]);g.addColorStop(1,st.sky[1]);
  ctx.fillStyle=g;ctx.fillRect(-30,-30,W+60,H+60);
  if(st.space&&this.stars){for(const s of this.stars){ctx.fillStyle='rgba(255,255,255,'+(0.25+s.z*0.4)+')';ctx.fillRect(s.x,s.y,s.z<1?1:2,s.z<1?1:2+Math.floor(s.z));}}
  for(const t of this.terrain)this.drawTerrain(t);
  for(const c of this.clouds)this.drawCloud(c.x,c.y,c.s);
  for(const d of this.drops){const yy=d.y+Math.sin(d.bob)*3;ctx.save();
    if(d.orb){const wc=this.curWeapon().col;ctx.shadowColor=wc;ctx.shadowBlur=16;
      ctx.fillStyle=wc;ctx.beginPath();ctx.arc(d.x,yy,12,0,7);ctx.fill();
      ctx.shadowBlur=0;ctx.fillStyle='#0a1428';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(this.isUlt()?'★':FAM_ICON[this.char.fam],d.x,yy);
      ctx.globalAlpha=0.4+Math.sin(performance.now()*0.008+d.x)*0.4;ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(d.x,yy,15,0,7);ctx.stroke();}
    else{const trap=isTrap(d.kind);
      const hue=(performance.now()*0.2+d.x)%360;
      if(trap){const t=performance.now();const pulse=0.5+0.5*Math.sin(t*0.012+d.x);const R=13+pulse*2;
        ctx.save();ctx.translate(d.x,yy);
        ctx.shadowColor='#ff2a2a';ctx.shadowBlur=10+pulse*12;
        ctx.rotate(Math.PI/4);
        ctx.fillStyle='#ffcc00';ctx.fillRect(-R,-R,R*2,R*2);
        ctx.shadowBlur=0;ctx.fillStyle='#1a1206';
        for(let s=-2;s<=2;s++){ctx.fillRect(-R,s*R*0.42-R*0.18,R*2,R*0.2);}
        ctx.rotate(-Math.PI/4);
        ctx.fillStyle='#ffcc00';ctx.beginPath();ctx.moveTo(0,-R*0.62);ctx.lineTo(R*0.6,R*0.5);ctx.lineTo(-R*0.6,R*0.5);ctx.closePath();ctx.fill();
        ctx.fillStyle='#1a1206';ctx.font='bold '+(R*0.95)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('!',0,R*0.06);
        ctx.globalAlpha=0.5+pulse*0.5;ctx.lineWidth=2;ctx.strokeStyle='#ff2a2a';ctx.rotate(Math.PI/4);ctx.strokeRect(-R-2,-R-2,R*2+4,R*2+4);
        ctx.restore();}
      else{ctx.shadowColor='hsl('+hue+',90%,60%)';ctx.shadowBlur=16;
        ctx.fillStyle='hsl('+hue+',80%,55%)';ctx.beginPath();ctx.arc(d.x,yy,12,0,7);ctx.fill();
        ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.font='bold 15px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('?',d.x,yy);}}
    ctx.restore();}
  this.drawBeam();this.drawWhip();
  for(const b of this.bullets){ctx.save();ctx.shadowColor=b.col;ctx.shadowBlur=8+b.r*1.6;
    if(b.laser){const L=b.llen||12;const gg=ctx.createLinearGradient(b.x,b.y-L,b.x,b.y+4);gg.addColorStop(0,'#fff');gg.addColorStop(1,b.col);
      ctx.fillStyle=gg;ctx.fillRect(b.x-b.r,b.y-L,b.r*2,L+4);}
    else{ctx.globalAlpha=0.4;ctx.fillStyle=b.col;ctx.beginPath();ctx.arc(b.x-b.vx*8,b.y-b.vy*8,b.r*0.7,0,7);ctx.fill();ctx.globalAlpha=1;
      ctx.fillStyle=b.col;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,7);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(b.x,b.y,b.r*0.45,0,7);ctx.fill();}
    ctx.restore();}
  for(const b of this.ebullets){ctx.beginPath();ctx.arc(b.x,b.y,b.big?8:5,0,7);ctx.fillStyle='#9a3dff';ctx.fill();ctx.lineWidth=1.6;ctx.strokeStyle='#fff';ctx.stroke();}
  for(const e of this.enemies)this.drawEnemy(e);
  if(this.boss)this.drawBoss();
  this.drawSaturn();
  this.drawMagnet();this.drawRingblade();this.drawFunnel();this.drawAllBeam();this.drawFreySpears();
  this.drawValkPillars();this.drawGravWave();
  const blink=this._inv>performance.now()&&Math.floor(performance.now()/80)%2===0;
  const bs=this.bodies();const nowMs=performance.now();
  for(let i=1;i<bs.length;i++){const tmr=this.optTimers[i-1];
    if(tmr&&tmr-nowMs<2500&&Math.floor(nowMs/120)%2===0)continue;
    ctx.save();ctx.globalAlpha=0.82;this.drawShip(bs[i].x,bs[i].y,this.me.r*0.6);ctx.restore();}
  if(this.wlv>=30)this.drawMaxAura(this.me.x,this.me.y,this.me.r);
  else{const _ti=tierIdx(this.wlv);if(_ti>=2)this.drawTierAura(this.me.x,this.me.y,this.me.r,_ti);}
  if(!blink)this.drawShip(this.me.x,this.me.y,this.me.r);
  this.drawSpecialFx();
  for(const p of this.parts){ctx.save();ctx.globalAlpha=Math.max(0,p.life/(p.ring?260:600));
    if(p.ring){ctx.strokeStyle=p.col;ctx.lineWidth=3;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.stroke();}
    else{ctx.shadowColor=p.col;ctx.shadowBlur=8;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();}ctx.restore();}
  ctx.restore();};

Game.prototype.drawMaxAura=function(x,y,r){const t=performance.now();ctx.save();
  const rg=ctx.createRadialGradient(x,y,r*0.6,x,y,r*2.5);rg.addColorStop(0,'rgba(255,255,255,0)');rg.addColorStop(0.65,hsl(t*0.12,90,62));rg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.globalAlpha=0.45;ctx.fillStyle=rg;ctx.beginPath();ctx.arc(x,y,r*2.5,0,7);ctx.fill();
  ctx.globalAlpha=0.85;ctx.shadowBlur=12;
  for(let k=0;k<10;k++){const a=t*0.004+k*0.628;const rr=r*1.9+Math.sin(t*0.005+k)*r*0.3;
    ctx.shadowColor=hsl(k*36+t*0.12,95,62);ctx.fillStyle=hsl(k*36+t*0.12,95,64);
    ctx.beginPath();ctx.arc(x+Math.cos(a)*rr,y+Math.sin(a)*rr,r*0.3,0,7);ctx.fill();}
  ctx.globalAlpha=0.5;ctx.lineWidth=2;ctx.strokeStyle=hsl(t*0.15,90,68);ctx.beginPath();ctx.arc(x,y,r*1.6,0,7);ctx.stroke();
  ctx.restore();};

Game.prototype.drawTierAura=function(x,y,r,ti){const t=performance.now();const col=TIERS[ti].c;const inten=(ti-2)*0.12;ctx.save();
  const R=r*(1.7+ti*0.12);
  const rg=ctx.createRadialGradient(x,y,r*0.7,x,y,R);rg.addColorStop(0,'rgba(255,255,255,0)');rg.addColorStop(0.7,col);rg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.globalAlpha=0.16+inten;ctx.fillStyle=rg;ctx.beginPath();ctx.arc(x,y,R,0,7);ctx.fill();
  ctx.globalAlpha=0.4+inten;ctx.shadowColor=col;ctx.shadowBlur=8;ctx.fillStyle=col;
  const n=ti;for(let k=0;k<n;k++){const a=t*0.003+k/n*Math.PI*2;ctx.beginPath();ctx.arc(x+Math.cos(a)*r*1.45,y+Math.sin(a)*r*1.45,r*0.17,0,7);ctx.fill();}
  ctx.globalAlpha=0.3+inten;ctx.lineWidth=1.5;ctx.strokeStyle=col;ctx.beginPath();ctx.arc(x,y,r*1.35,0,7);ctx.stroke();
  ctx.restore();};
</script>
<script>
/* 必殺技エフェクト: 種別ごとの一閃。新規 skyfall / collapse / mandala を含む */
Game.prototype.drawSpecialFx=function(){const f=this.specialFx;if(!f)return;
  const p=f.t/f.dur;const me=this.me;const n=f.charge||1;const lv=f.lv||1;
  const col=f.col;const fade=Math.max(0,1-p);const cb=Math.floor((lv-1)/6);const lf=1+(lv-1)*0.02;const D=Math.max(W,H);
  ctx.save();ctx.globalAlpha=fade;ctx.shadowColor=col;ctx.shadowBlur=20+n*6;ctx.lineCap='round';
  switch(f.kind){
  case 'beam':{const beams=1+Math.floor(lv/8)+(n-1);const half=(28+n*10)*lf;
    for(let i=0;i<beams;i++){const ox=me.x+(i-(beams-1)/2)*half*1.7;
      const gg=ctx.createLinearGradient(ox-half,0,ox+half,0);gg.addColorStop(0,'rgba(255,255,255,0)');gg.addColorStop(0.5,'#fff');gg.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=gg;ctx.fillRect(ox-half,0,half*2,me.y);
      ctx.globalAlpha=fade*0.5;ctx.fillStyle=col;ctx.fillRect(ox-half*1.4,0,half*2.8,me.y);ctx.globalAlpha=fade;}break;}
  case 'lance':{const lances=1+(n-1)+Math.floor(lv/10);const half=(13+n*6)*lf;
    for(let i=0;i<lances;i++){const ox=me.x+(i-(lances-1)/2)*half*2.4;
      ctx.fillStyle='#fff';ctx.beginPath();ctx.moveTo(ox,0);ctx.lineTo(ox+half,me.y*0.5);ctx.lineTo(ox,me.y);ctx.lineTo(ox-half,me.y*0.5);ctx.closePath();ctx.fill();
      ctx.strokeStyle=col;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(ox,0);ctx.lineTo(ox,me.y);ctx.stroke();}break;}
  case 'press':{if(p<0.35){const dy=me.y*(p/0.35);ctx.globalAlpha=fade*0.85;ctx.fillStyle=col;ctx.shadowBlur=30;
      ctx.beginPath();ctx.arc(me.x,dy,(40+n*14)*lf,0,7);ctx.fill();
      ctx.fillStyle='rgba(0,0,0,0.25)';ctx.beginPath();ctx.ellipse(me.x,me.y+10,(48+n*16)*lf*(p/0.35),12,0,0,7);ctx.fill();}
    else{const pp=(p-0.35)/0.65;const R=D*pp;ctx.strokeStyle=col;ctx.lineWidth=(16*(1-pp)+3)*lf;ctx.beginPath();ctx.arc(me.x,me.y,R,0,7);ctx.stroke();
      ctx.strokeStyle='#fff';ctx.lineWidth=6*(1-pp)+1;ctx.beginPath();ctx.arc(me.x,me.y,R*0.8,0,7);ctx.stroke();
      const nd=8+cb*2;for(let k=0;k<nd;k++){const a=k/nd*Math.PI*2;ctx.fillStyle=col;ctx.beginPath();ctx.arc(me.x+Math.cos(a)*R*0.9,me.y+Math.sin(a)*R*0.9,4,0,7);ctx.fill();}}break;}
  case 'prism':{const spokes=12+cb*3+n*2;const rot=p*2;const len=D*Math.min(1,p*1.5);
    for(let i=0;i<spokes;i++){const a=rot+i/spokes*Math.PI*2;const c2=hsl(i/spokes*360+p*200,90,65);
      ctx.strokeStyle=c2;ctx.shadowColor=c2;ctx.lineWidth=(3+n)*lf;ctx.beginPath();ctx.moveTo(me.x,me.y);ctx.lineTo(me.x+Math.cos(a)*len,me.y+Math.sin(a)*len);ctx.stroke();}
    for(let k=0;k<14;k++){const a=Math.random()*7,rr=Math.random()*D*0.5;ctx.fillStyle=hsl(Math.random()*360,90,70);ctx.beginPath();ctx.arc(me.x+Math.cos(a)*rr,me.y+Math.sin(a)*rr,2,0,7);ctx.fill();}break;}
  case 'paws':{const paws=8+cb*2+n*2;const R=D*Math.min(0.55,p*0.8);
    for(let i=0;i<paws;i++){const a=i/paws*Math.PI*2+p*3;const rr=R*(0.4+(i%3)*0.3);const px=me.x+Math.cos(a)*rr,py=me.y+Math.sin(a)*rr;const s2=(8+n*2)*lf;
      ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(px,py,s2,s2*0.85,0,0,7);ctx.fill();
      for(let t2=0;t2<4;t2++){const ta=-Math.PI/2+(t2-1.5)*0.5;ctx.beginPath();ctx.arc(px+Math.cos(ta)*s2*0.95,py+Math.sin(ta)*s2*0.95,s2*0.3,0,7);ctx.fill();}}break;}
  case 'slash':{const slashes=4+n+cb;
    for(let i=0;i<slashes;i++){const prog=Math.min(1,(p*slashes)-i);if(prog<=0)continue;
      const a=(i*1.7)%Math.PI-Math.PI/2;ctx.save();ctx.translate(me.x,me.y);ctx.rotate(a);ctx.globalAlpha=fade*(1-prog*0.3);
      ctx.strokeStyle=col;ctx.lineWidth=(10+n*3)*lf;ctx.shadowColor=col;ctx.shadowBlur=18;ctx.beginPath();ctx.arc(0,0,D*0.5,-0.5-prog*0.4,0.5+prog*0.4);ctx.stroke();
      ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,D*0.5,-0.4,0.4);ctx.stroke();ctx.restore();}break;}
  case 'sweep':{const bars=2+cb;
    for(let i=0;i<bars;i++){const by=((p+i/bars)%1)*H;
      const gg=ctx.createLinearGradient(0,by-8,0,by+8);gg.addColorStop(0,'rgba(255,255,255,0)');gg.addColorStop(0.5,col);gg.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=gg;ctx.fillRect(0,by-(6+n*2),W,(12+n*4));ctx.fillStyle='#fff';ctx.fillRect(0,by-1,W,2);}break;}
  case 'bound':{const orbs=10+cb*3+n*3;
    for(let i=0;i<orbs;i++){const a=i/orbs*Math.PI*2;const bounce=Math.abs(Math.sin(p*6+i));const rr=D*0.5*((i%5)/5*0.6+0.4)*Math.min(1,p*1.4);
      const px=me.x+Math.cos(a)*rr,py=me.y+Math.sin(a)*rr-bounce*28;ctx.fillStyle=col;ctx.shadowColor=col;ctx.beginPath();ctx.arc(px,py,(6+n)*lf,0,7);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(px,py,3,0,7);ctx.fill();}break;}
  case 'spirit':{const arms=3+cb;ctx.lineWidth=(4+n)*lf;
    for(let s=0;s<arms;s++){ctx.strokeStyle=col;ctx.globalAlpha=fade*0.7;ctx.beginPath();
      for(let u=0;u<=1;u+=0.04){const ang=s/arms*Math.PI*2+u*Math.PI*4+p*4;const rr=D*0.5*u*Math.min(1,p*1.5);const px=me.x+Math.cos(ang)*rr,py=me.y+Math.sin(ang)*rr;if(u===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);}ctx.stroke();}
    ctx.globalAlpha=fade;for(let k=0;k<6+n*2;k++){const ang=k+p*5,rr=D*0.3*((k%3)/3+0.3);ctx.fillStyle=col;ctx.beginPath();ctx.arc(me.x+Math.cos(ang)*rr,me.y+Math.sin(ang)*rr,5,0,7);ctx.fill();}break;}
  case 'flame':{const cols2=6+cb*2;for(let i=0;i<cols2;i++){const fx=(i+0.5)/cols2*W;const h=H*Math.min(1,p*1.6)*(0.6+Math.sin(i*2+p*10)*0.2);
      const gg=ctx.createLinearGradient(fx,H,fx,H-h);gg.addColorStop(0,'#fff2a0');gg.addColorStop(0.5,col);gg.addColorStop(1,'rgba(255,80,20,0)');
      ctx.fillStyle=gg;ctx.fillRect(fx-(10+n*3),H-h,(20+n*6),h);}
    ctx.globalAlpha=fade*0.85;ctx.strokeStyle='#fff2a0';ctx.lineWidth=4;ctx.shadowColor=col;const wsp=D*0.3*Math.min(1,p*2);
    for(const s of [-1,1]){ctx.beginPath();ctx.moveTo(me.x,me.y);ctx.quadraticCurveTo(me.x+s*wsp,me.y-wsp*0.8,me.x+s*wsp*1.4,me.y);ctx.stroke();}break;}
  case 'skyfall':{const cols2=6+cb*2+n*2;
    for(let i=0;i<cols2;i++){const fx=(i+0.5)/cols2*W;const phase=(p*1.5+i*0.11)%1;
      const h=H*Math.min(1,phase*2.2);const half=(10+n*3)*lf;
      const gg=ctx.createLinearGradient(fx,0,fx,h||1);gg.addColorStop(0,'#ffffff');gg.addColorStop(0.5,'#fff0a0');gg.addColorStop(1,'rgba(255,210,100,0)');
      ctx.fillStyle=gg;ctx.fillRect(fx-half,0,half*2,h);ctx.fillStyle='#fff';ctx.fillRect(fx-1.5,0,3,h);}
    const rays=12+cb*2;for(let i=0;i<rays;i++){const a=i/rays*Math.PI*2+p;ctx.strokeStyle='rgba(255,240,160,0.5)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(me.x,me.y);ctx.lineTo(me.x+Math.cos(a)*D*0.5,me.y+Math.sin(a)*D*0.5);ctx.stroke();}
    ctx.fillStyle='#fff';ctx.shadowColor='#fff0a0';ctx.shadowBlur=24;const cs=(30+n*10)*lf*Math.min(1,p*2);
    ctx.fillRect(me.x-cs*0.1,me.y-cs,cs*0.2,cs*2);ctx.fillRect(me.x-cs,me.y-cs*0.1,cs*2,cs*0.2);break;}
  case 'collapse':{if(p<0.5){const pp=p/0.5;ctx.fillStyle='#05050f';ctx.beginPath();ctx.arc(me.x,me.y,(28+n*12)*lf*(1-pp*0.3),0,7);ctx.fill();
      ctx.strokeStyle=col;ctx.lineWidth=2;for(let s=0;s<6+cb;s++){ctx.globalAlpha=fade*0.6;ctx.beginPath();
        for(let u=0;u<=1;u+=0.05){const ang=s+u*Math.PI*7-pp*9;const rr=D*0.6*(1-u)*(1-pp*0.6);ctx.lineTo(me.x+Math.cos(ang)*rr,me.y+Math.sin(ang)*rr);}ctx.stroke();}
      ctx.globalAlpha=fade;ctx.strokeStyle='#bcd8ff';ctx.lineWidth=3;ctx.beginPath();ctx.arc(me.x,me.y,(28+n*12)*lf+4,0,7);ctx.stroke();
      for(let k=0;k<10;k++){const a=k/10*Math.PI*2-pp*6;const rr=D*0.5*(1-pp);ctx.fillStyle='#9ab8ff';ctx.beginPath();ctx.arc(me.x+Math.cos(a)*rr,me.y+Math.sin(a)*rr,4,0,7);ctx.fill();}}
    else{const pp=(p-0.5)/0.5;const rings=2+cb;
      for(let ri=0;ri<rings;ri++){const R=D*Math.max(0,(pp-ri*0.12))*1.1;if(R<=0)continue;
        ctx.strokeStyle=ri%2?'#fff':col;ctx.lineWidth=(13*(1-pp)+3)*lf;ctx.beginPath();ctx.arc(me.x,me.y,R,0,7);ctx.stroke();}}break;}
  case 'mandala':{const layers=3+cb+(n-1);const baseR=D*0.5*Math.min(1,p*1.4);
    for(let L=0;L<layers;L++){const sides=3+L;const rr=baseR*(0.35+L*0.18);const rot=p*(L%2?-2.2:2.2)+L*0.7;
      const cc=hsl((L*55+p*220)%360,85,68);ctx.strokeStyle=cc;ctx.shadowColor=cc;ctx.shadowBlur=12;ctx.lineWidth=2.4;ctx.globalAlpha=fade*0.9;
      ctx.beginPath();for(let i=0;i<=sides;i++){const a=rot+i/sides*Math.PI*2;const x2=me.x+Math.cos(a)*rr,y2=me.y+Math.sin(a)*rr;if(i===0)ctx.moveTo(x2,y2);else ctx.lineTo(x2,y2);}ctx.stroke();
      ctx.strokeStyle='#fff';ctx.lineWidth=0.8;ctx.stroke();}
    const rays=16+cb*4+n*2;ctx.globalAlpha=fade*0.5;ctx.shadowColor='#fff6c8';ctx.shadowBlur=8;
    for(let i=0;i<rays;i++){const a=i/rays*Math.PI*2+p;ctx.strokeStyle='#fff6c8';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(me.x,me.y);ctx.lineTo(me.x+Math.cos(a)*baseR,me.y+Math.sin(a)*baseR);ctx.stroke();}
    ctx.globalAlpha=fade;ctx.fillStyle='#fff';for(let k=0;k<8;k++){const a=k/8*Math.PI*2-p*3;ctx.beginPath();ctx.arc(me.x+Math.cos(a)*baseR*0.5,me.y+Math.sin(a)*baseR*0.5,3,0,7);ctx.fill();}break;}
  default:{const R=D*Math.min(1.1,p*1.5);ctx.strokeStyle=col;ctx.lineWidth=10*(1-p)+2;ctx.beginPath();ctx.arc(me.x,me.y,R,0,7);ctx.stroke();
    ctx.strokeStyle='#fff';ctx.lineWidth=4*(1-p)+1;ctx.beginPath();ctx.arc(me.x,me.y,R*0.82,0,7);ctx.stroke();}
  }
  ctx.restore();};
</script>
<script>
/* ヴァルキリー: 降ってくる聖なる光柱(予兆→本射) */
Game.prototype.drawValkPillars=function(){if(!this.pillars||!this.pillars.length)return;const c=ctx;
  for(const p of this.pillars){const TEL=p.tel,STR=p.str;c.save();
    if(p.t<TEL){const k=p.t/TEL;c.globalAlpha=0.25+0.5*k;c.strokeStyle=p.col2;c.lineWidth=2;c.setLineDash([7,7]);
      c.beginPath();c.moveTo(p.x,0);c.lineTo(p.x,H);c.stroke();c.setLineDash([]);
      c.fillStyle=p.col2;c.globalAlpha=0.4+0.5*k;c.beginPath();c.arc(p.x,18,4+6*k,0,7);c.fill();}
    else if(p.t<TEL+STR){const k=1-(p.t-TEL)/STR;const half=(16+(p.dmg>8?4:0))*(0.6+k*0.6);
      c.globalAlpha=0.5+0.45*k;c.shadowColor=p.col;c.shadowBlur=24;
      const g=c.createLinearGradient(p.x-half,0,p.x+half,0);g.addColorStop(0,'rgba(255,240,160,0)');g.addColorStop(0.5,'#ffffff');g.addColorStop(1,'rgba(255,240,160,0)');
      c.fillStyle=g;c.fillRect(p.x-half,0,half*2,H);
      c.fillStyle='#fff';c.fillRect(p.x-2,0,4,H);
      c.shadowBlur=0;c.fillStyle=p.col;c.globalAlpha=(0.5+0.45*k)*0.6;c.beginPath();c.moveTo(p.x,0);c.lineTo(p.x-half*1.6,-12);c.lineTo(p.x+half*1.6,-12);c.closePath();c.fill();}
    c.restore();}};

/* マグニータ: 広がる重力波の同心円リング */
Game.prototype.drawGravWave=function(){if(!this.gravRings||!this.gravRings.length)return;const c=ctx;const me=this.me;const maxR=Math.max(W,H)*0.62;
  for(const g of this.gravRings){c.save();c.globalAlpha=Math.max(0,0.55*(1-g.r/maxR));c.shadowColor='#8aa8ff';c.shadowBlur=14;
    c.strokeStyle='#9ab8ff';c.lineWidth=4;c.beginPath();c.arc(me.x,me.y,g.r,0,7);c.stroke();
    c.strokeStyle='#fff';c.lineWidth=1.5;c.beginPath();c.arc(me.x,me.y,g.r,0,7);c.stroke();
    c.restore();}};

Game.prototype.drawBeam=function(){const w=this.curWeapon();if(!w.beam)return;const half=12+this.wlv*0.9+((this.char&&this.char.pow)?this.char.pow*3:4);
  for(const bd of this.bodies()){ctx.save();const flick=0.7+Math.random()*0.3;ctx.globalAlpha=flick;ctx.shadowColor=w.col;ctx.shadowBlur=24;
    const gg=ctx.createLinearGradient(bd.x-half,0,bd.x+half,0);gg.addColorStop(0,'rgba(110,255,255,0)');gg.addColorStop(0.5,'#dfffff');gg.addColorStop(1,'rgba(110,255,255,0)');
    ctx.fillStyle=gg;ctx.fillRect(bd.x-half,0,half*2,bd.y);ctx.globalAlpha=1;ctx.fillStyle='#fff';ctx.fillRect(bd.x-3,0,6,bd.y);ctx.restore();}};

Game.prototype.drawWhip=function(){if(!this.whip)return;const wp=this.whip;const prog=wp.t/wp.dur;const reach=Math.max(W,H)*(wp.reach||0.5);
  const arc=wp.arc||Math.PI*0.9;const ang=-Math.PI/2-arc*0.5+prog*arc;const bs=this.bodies();
  bs.forEach((me,bi)=>{ctx.save();ctx.lineCap='round';ctx.shadowColor=wp.col;ctx.shadowBlur=bi?8:20;
    for(let a=0;a<3;a++){const pa=ang-a*0.16;ctx.globalAlpha=(bi?0.3:0.6)*(1-a*0.28);
      ctx.strokeStyle=a===0?'#fff':wp.col;ctx.lineWidth=(bi?3:7)-a*1.6;
      ctx.beginPath();ctx.moveTo(me.x,me.y-this.me.r);
      for(let s=0.1;s<=1;s+=0.08){const wob=Math.sin(s*7+prog*6)*10*(1-s);ctx.lineTo(me.x+Math.cos(pa)*reach*s-Math.sin(pa)*wob,me.y+Math.sin(pa)*reach*s+Math.cos(pa)*wob);}
      ctx.stroke();}
